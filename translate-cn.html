const PROMPT=`你是协助台湾客户看懂日本房地产贩售图面的专家。阅读这份日文物件资料，整理成繁体中文。只输出 JSON：{"物件类型":"","物件名称":"","房间格局":"","专有面积":"","阳台面积":"","土地面积":"","建物面积":"","周边环境":"","翻新":"","金额":{"贩售价格":"","管理费":"","修缮基金":"","其他费用":""},"物件资讯":{"地址":"","建筑年月":"","交通":"","建筑构造":"","管理型态":"","管理公司":"","总户数":""},"分析":{"优点":"","缺点":""},"补充":"","连结资讯":""}
规则：
- 【第一步・最优先判断｜从严】这张图必须是「日本房地产贩售图面／マイソク」——图面上要**用文字明确印出**贩售资料：至少要同时看得到「**价格**」以及「格局／面积／地址／户数」等物件规格文字（通常还会有间取图）。**只要符合以下任一种，一律只输出 {"not_property": true} 并结束**：①主要是照片（房间实景照、外观照、风景、街景、人物）；②图上没有明确印出的「价格」文字；③看不到成套的物件规格文字；④菜单、地图截图、广告或其他无关图。**【严禁瞎掰】就算你觉得「认得」这个建案、或看得出格局，也绝对不可以凭印象、记忆或猜测，填入物件名、地址、价格、户数、屋龄、交通等任何资料——所有内容都必须是这张图上『真的印出来的文字』。只要没有印出的贩售文字，就是 not_property；宁可回报不是物件图，也绝不准编造。**
- 【第二步判断】如果这其实是「投资物件」，不要用住宅格式，直接只输出 {"switch_to":"invest"} 就结束。以下全都算投资物件：①収益物件／オーナーチェンジ／年间赁料等收益资料；②有写任何利回（表面利回／実质利回／利回り）；③旅馆・ホテル・民泊・简易宿所・ゲストハウス・宿泊施设 等住宿营运物件；④整栋（一栋マンション／一栋アパート／一栋ビル／一栋）。（系统会自动改用投资格式重新分析，避免放错。）
- 【最高优先・务必遵守】除了「物件名称」（见下一条）外，所有栏位内容一律用繁体中文（台湾用语）。**绝对禁止出现日文假名（平假名／片假名），也绝对禁止用英文或罗马拼音代替**。日文汉字词换成台湾看得懂的说法。输出前逐栏自我检查，发现假名或英文就改成中文。特别注意「周边环境」「翻新」「补充」最常残留，务必全部中文化。
- 【务必「自然的台湾中文」，绝不要日式中文】翻译＝用台湾人习惯的说法把意思**整句重新讲一遍**，不是逐字替换。日文语尾与助词（です／だ／である／となる／とする／あり／なし／の／と／し／を／が／は）**一律不可残留，也绝不可翻成「为」这种怪尾巴**；整句改写成通顺中文再输出。专有词务必照这样翻：幅员→宽度；接道→临路（面路）；モルタル→砂浆（灰泥）；セットバック→建筑线退缩（需退缩）；古家あり／古家付き→含旧屋；本社→本公司；トランクルーム→储藏室；现况优先→以现况为准；図面と异なる场合→若与图面不符；南西→西南、南东→东南、北西→西北、北东→东北。范例（左边错→右边对）：「※本社指定の司法书士とする」→「※由本公司指定的司法书士办理」；「※古家付」→「※含旧屋」；「※セットバック必要」→「※需退缩建筑线」；「※図面と异なる场合は现况优先」→「※如与图面不符，以现况为准」。
- 物件名称：专有建案名保留日文原文、后面用（）附上中文；但若名称其实是「地址＋描述词」，**描述词一律翻中文、地名汉字用中文**（例：墨田区→墨田区、古家あり→含旧屋、新筑→新成屋、角地→转角地、更地→空地、中古→中古）。范例：オークプレス目黒行人坂（欧克普雷斯目黑行人坂）／「墨田区墨田３丁目 土地（古家あり）」→「墨田区墨田3丁目 土地（含旧屋）」。
- 【地名/车站/建物名一律用中文汉字，严禁英文化/罗马拼音】：小山台 就写「小山台」不可写 Koyama-dai；品川区→品川区；恵比寿→惠比寿；○○駅→○○站。**不要输出英文句子，也不要在中文后面用括号再重复一次英文**。

- 店名／品牌：有通用中文就用中文（ローソン→罗森／ファミリーマート→全家／セブンイレブン→7-ELEVEN／业务スーパー→业务超市／マツモトキヨシ→松本清药妆店／ドン・キホーテ→唐吉诃德）；**没有通用中文的日文店名，保留日文原名即可，但绝不可翻成英文或罗马拼音**（例如 ライフ、オオゼキ 这种就照原样，不要写成 Life、Oseki）。

- 物件类型判断为「公寓」「一户建」「土地」或「其他」。公寓：填专有面积、阳台面积、管理费、修缮基金、管理型态、管理公司、总户数。一户建：填土地面积、建物面积；管理相关栏位填「图面未标示」。土地：填土地面积；房间格局与建物相关栏位填「图面未标示」。
- 一户建（透天）若各楼层面积不同，「建物面积」栏位请写清楚每层楼的大小，每层独立一行，例如「1楼 12.5坪\n2楼 10.8坪\n3楼 6.2坪」，方便客户看每层空间。
- 地址尽量完整（都道府县市区町村番地），此栏会用来显示地图，务必准确；只判读得出部分就填部分，完全无法判读填「图面未标示」。
- 交通：写最近车站与徒步分钟。把「駅」翻成「车站」或「站」。若有多条路线或多个车站，请「每个车站独立一行」，用换行分隔。范例：
JR山手线・JR京滨东北线・东急目黑线「目黑」站 徒步10分
JR山手线・JR京滨东北线・东急目黑线「惠比寿」站 徒步12分

function kata2romaji(run){
  var s=run.replace(/[ァ-ヶ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0x60);}).replace(/ー/g,'ー');
  var out='',i=0;
  while(i<s.length){
    var two=s.substr(i,2);
    if(HK[two]){out+=HK[two];i+=2;continue;}
    var c=s[i];
    if(c==='っ'){var nx=HK[s.substr(i+1,2)]||HK[s[i+1]]||'';if(nx)out+=nx[0];i++;continue;}
    if(c==='ー'){if(out)out+=out[out.length-1];i++;continue;}
    out+=(HK[c]||c);i++;
  }
  return out?out.charAt(0).toUpperCase()+out.slice(1):out;
}
function jaClean(s){
  if(typeof s!=='string'||!s)return s;
  for(var i=0;i<TERM.length;i++){if(s.indexOf(TERM[i][0])>=0)s=s.split(TERM[i][0]).join(TERM[i][1]);}
  s=s.replace(/[一-鿿]/g,function(c){return JPCHAR[c]||c;});
  s=s.replace(/の/g,'之').replace(/[ヶヵ]/g,''); // 地名常见连接假名（林试の森→林试之森、梅ヶ丘→梅丘）
  return s; // 不做罗马拼音：字典没收录的少数词保留原样（真日文），不硬转成怪英文
}
function deepClean(o){
  if(typeof o==='string')return jaClean(o);
  if(Array.isArray(o))return o.map(deepClean);
  if(o&&typeof o==='object'){var r={};for(var k in o){r[k]=deepClean(o[k]);}return r;}
  return o;
}

function b64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});}
function processImage(file){return new Promise((res)=>{if(!file.type.startsWith('image/')){b64(file).then(d=>res({data:d,mediaType:file.type||'application/pdf'}));return;}const img=new Image();img.onload=()=>{let w=img.naturalWidth,h=img.naturalHeight;const max=1536;if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}const cv=document.createElement('canvas');cv.width=w;cv.height=h;const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';ctx.drawImage(img,0,0,w,h);try{const u=cv.toDataURL('image/jpeg',0.82);res({data:u.split(',')[1],mediaType:'image/jpeg'});}catch(e){b64(file).then(d=>res({data:d,mediaType:file.type}));}};img.onerror=()=>{b64(file).then(d=>res({data:d,mediaType:file.type}));};img.src=URL.createObjectURL(file);});}

  if(/high demand|overload|try again later|UNAVAILABLE|503/i.test(s))return 'Gemini 现在使用量较大，请等几秒再按一次「开始翻译分析」';
  if(/quota|RESOURCE_EXHAUSTED|429|exceed/i.test(s))return '免费额度暂时达到上限（连续太快会这样），请等 1~2 分钟再按一次';
  if(/API.?key|invalid|PERMISSION/i.test(s))return '后端金钥设定有误，请确认 Cloudflare 设定';
  if(/fetch|network|Failed to/i.test(s))return '连线不稳，请再按一次「开始翻译分析」';
  if(/截断|Unterminated|token|JSON/i.test(s))return 'AI 回答被截断，请再按一次重试';
  if(/格式/.test(s))return s;
  return '发生错误，请再试一次（'+s+'）';}

async function callWorker(body){if(OWNER)body.owner=OWNER;let last;for(let i=0;i<3;i++){try{const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();
      // 额度/限流错误：不要重试！重试只会在一分钟内再多打几次，反而更快撞上每分钟上限。直接回传让使用者稍等。
      if(j&&j.error&&/quota|resource_exhausted|429|exceed/i.test(j.error))return j;
      // 只有「伺服器暂时忙线」(503/overload) 才重试，且间隔拉长、次数减少。
      if(j&&j.error&&/high demand|overload|unavailable|503|try again|busy/i.test(j.error)){last=new Error(j.error);await delay(3000*(i+1));continue;}
      return j;}catch(e){last=e;await delay(1500);}}return{error:(last&&last.message)?last.message:'伺服器忙线，请稍后再试'};}

  try{

    var lang=/-cn\./.test(p)?'简中':(/-ja\./.test(p)?'日文':'繁中');
    var payload={log:1, paid:0, cost:0, mode:(mode==='invest'?'投资物件':'住宅物件'), lang:lang,
      "类型":String(label||'上传'), "物件名称":'', "地址":'', "交通":'', "价格":'', "利回":''};
    if(proc&&proc.data){payload.img=proc.data;payload.imgType=proc.mediaType||'image/jpeg';}
    fetch(WORKER_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  }catch(_){}
}
function logUpload(o,proc,paid,cost){

    fetch(WORKER_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  }catch(_){}
}

async function go(){
  if(!file)return;
  const now=Date.now();
  let times=_thGet().filter(t=>now-t<600000); // 只看近 10 分钟
  const b=document.getElementById('goBtn');
  // 超过总量：伪装成「系统忙碌」并顺势导 LINE，不明说是限制
  if(times.length>=WINDOW_MAX){showErr('系统整理中，请过几分钟再试～ 想更快的话，直接把图传到周周 LINE，我帮你看更快 💬');return;}
  if(b){b.disabled=true;b.textContent='努力分析中…';}
  showLoad(true);
  document.getElementById('err').style.display='none';
  // 距离上次太近：先静静等一下（画面停在「分析中…」，看起来只是还在处理）
  const lastT=times.length?times[times.length-1]:0;
  const wait=Math.max(0,MIN_GAP-(now-lastT));
  if(wait>0)await delay(wait);
  times.push(Date.now());_thSet(times);
  if(typeof gtag==='function'){try{gtag('event','translate_start',{mode:mode});}catch(_){}}
  let proc=null;
  try{
    proc=await processImage(file);
    // 【把关】翻译前先做一道独立、严格的判断：不是物件贩售图面（纯照片等）就直接挡，不进翻译、不瞎掰。
    try{
      const cj=await callWorker({data:proc.data,mediaType:proc.mediaType,prompt:CLASSIFY_PROMPT,gate:1});
      if(cj&&!cj.error){
        let cc=null; try{cc=JSON.parse(String(cj.text||'').replace(/```json|```/g,'').trim());}catch(_){}
        if(cc&&cc.is_property===false){
          if(typeof gtag==='function'){try{gtag('event','translate_notproperty');}catch(_){}}
          logRaw(proc,'🙈 非物件图(挡下)'); // 被挡的也记进后台，含原图
          showErr('🙈 这看起来不是「物件贩售图面」喔！请上传日文的物件贩卖资料图（就是上面有印价格、格局、面积那种的贩售图）；房间照片、风景照、外观照没办法分析～');
          return;
        }
      }
    }catch(_){}
    let o=null,switched=false,paidFlag=0,costVal=0;
    for(let attempt=0;attempt<2;attempt++){
      const j=await callWorker({data:proc.data,mediaType:proc.mediaType,prompt:(mode==='invest'?INVEST_PROMPT:PROMPT)});
      if(j.error)throw new Error(j.error);
      paidFlag=j.paid?1:0; // 后端回传：这张有没有用到付费金钥（免费爆量才会=1）
      costVal=j.cost||0;   // 这张的实际花费(美元，依 token 计)
      try{o=JSON.parse(String(j.text||'').replace(/```json|```/g,'').trim());}catch(pe){throw new Error('截断');}
      if(!o||typeof o!=='object')throw new Error('回传格式异常，请重试');
      if(o.not_property){ if(typeof gtag==='function'){try{gtag('event','translate_notproperty');}catch(_){}} logRaw(proc,'🙈 非物件图(挡下)'); showErr('🙈 这看起来不是「物件贩售图面」喔！请上传日文的物件贩卖资料图（就是上面有印价格、格局、面积那种的贩售图）；房间照片、风景照、外观照没办法分析～'); return; }
      // 自动判断：若其实是另一种物件类型，切换模式重新分析一次（避免客户选错模式放错回复）
      if(!switched && (o.switch_to==='invest'||o.switch_to==='home') && o.switch_to!==mode){ mode=o.switch_to; setMode(mode); switched=true; continue; }
      break;
    }
    var _nm=o.物件名称; o=deepClean(o); if(_nm!=null)o.物件名称=String(_nm).replace(/[一-鿿]/g,function(c){return JPCHAR[c]||c;}); // 物件名称保留原文，但把日文汉字(区→区等)换成繁体，不动片假名建案名
    if(typeof gtag==='function'){try{gtag('event','translate_done',{mode:mode,ptype:String(o.物件类型||'')});}catch(_){}}
    logUpload(o,proc,paidFlag,costVal); // 统整到 Cloudflare(含原图)，周周后台 /admin/logs.html 看得到
    (mode==='invest'?showInvestResult(o):showResult(o));
  }catch(e){
    var raw=(e&&e.message)?e.message:String(e);
    try{console.log('[translate error]',raw);}catch(_){}
    var msg='分析失败：'+zhErr(raw);
    if(/debug/i.test(location.search+location.hash))msg+='　〔debug｜原始错误：'+raw+'〕';
    logRaw(proc,'⚠️ 分析失败:'+String(zhErr(raw)).slice(0,20)); // 失败的上传也记进后台，含原图
    showErr(msg);
  }
}
