const PROMPT=`你是协助台湾客户看懂日本房地产贩售图面的专家。阅读这份日文物件资料，整理成繁体中文。只输出 JSON：{"物件类型":"","物件名称":"","房间格局":"","专有面积":"","阳台面积":"","土地面积":"","建物面积":"","周边环境":"","翻新":"","金额":{"贩售价格":"","管理费":"","修缮基金":"","其他费用":""},"物件资讯":{"地址":"","建筑年月":"","交通":"","建筑构造":"","管理型态":"","管理公司":"","总户数":""},"分析":{"优点":"","缺点":""},"补充":"","连结资讯":""}

规则：

- 物件类型：判断为「一栋公寓大楼（钢筋混凝土）」「一栋公寓（木造／轻量钢骨）」「整栋商业大楼」「区分（单户收租）」「土地」或「其他」，用中文写，不要用日文假名。
- 利回（投报率）最重要，务必仔细判读：表面利回り→表面利回；実质利回り→实质利回；现况利回り→现况利回；満室时利回り→满室想定利回。照图面数字写成百分比（例：7.85%）。完全没有的栏位才填「图面未标示」，不要乱编；尤其「实质利回」图面常常没写，没写就填「图面未标示」（系统会另外推估，你不用自己算）。
- 金额：贩售价格、年间赁料收入（通常是「満室想定」年收）、月额赁料收入、管理营运支出（管理费・修缮・固定资产税等，有写才填）。金额换好懂（例：1亿2,800万円→1亿2,800万日圆）。
- 收益资讯：总户数（○户／○室）；入居状况（満室→满租／空室あり→有空房／入居率○%／○户中○户入居 都翻中文）；格局构成（例：1K×8户、2LDK×4户）；建物构造（材料造／地上Y楼建，材料用中文：钢筋混凝土造／钢骨造／木造，不要用RC/SRC、用「楼」不要用「阶」）；建筑年月（含完工年月）；土地面积；建物面积（延床面积）。
- 物件资讯：地址尽量完整（会用来显示地图，务必准确）；交通（最近车站＋徒步分钟，「駅」翻「车站／站」，多车站各自独立一行）；用途地域、建蔽率／容积率（有写才填）；管理状况。
- 分析「利回分析」：站在房仲角度白话解读这个物件的投报率，务必保守务实、不要保证稳赚或断定报酬。重点提醒：表面利回是还没扣管理费、修缮、空室、税金的「毛数字」，实际到手的实质利回会更低；并依「格局构成」点出主要客层（例：1K 多为单身上班族／学生，家庭房型客层较稳定但租金总额高）；以及影响收益的关键（屋龄与未来修缮、入居率与空室风险、贷款条件等）。每点独立一行、开头加「・」，内容写具体、可以多写几点。
- 分析「优点」：大方写出收租卖点（利回水准、满租、户数规模、屋况、车站距离、生活机能等），每点独立一行、开头加「・」，至少写 4～6 点、写具体一点。
- 分析「缺点」：写 1～2 点需要留意的地方，用提醒的语气点出方向（例如屋龄偏高未来修缮、入居率、区位空室等），具体一点但不要写得太绝、不要直接断定，每点独立一行、开头加「・」。一定要有内容，不可空白。
- 补充：用途地域、防火指定、现况、交屋、管理状况、租金明细（レントロール）、注意事项、特约等重点整合在此，全部翻中文、不留日文，每点独立一行、开头加「・」。
- 连结资讯：图面上的网址、QR 旁说明或重要描述（网址照原样写出）。没有就留空字串。
- 没写的栏位一律填「图面未标示」，不要猜测编造。
- 若整张图品质太差大部分无法判读，在「补充」明确写：「・图片不够清晰，建议提供画质更好的图片，或直接咨询周周更快喔！」宁可不分析也不要给错误资讯。`;

  var money=R('贩售价格',m.贩售价格)+R('年间赁料收入',m.年间赁料收入)+R('月额赁料收入',m.月额赁料收入)+R('管理／营运支出',m.管理营运支出);
  var moneyCard=money?`<div class="tcard"><h3>💰 金额・收益</h3>${money}</div>`:'';
  var income=R('总户数',inc.总户数)+R('入居状况',inc.入居状况)+R('格局构成',inc.格局构成)+R('建物构造／材料',inc.建物构造)+R('建筑年月',inc.建筑年月)+R('土地面积',inc.土地面积)+R('建物面积',inc.建物面积);
  var incomeCard=income?`<div class="tcard"><h3>🏢 收益资讯</h3>${income}</div>`:'';
  var detail=R('地址',info.地址)+R('交通／车站',info.交通)+R('用途地域',info.用途地域)+R('建蔽率／容积率',info.建蔽率容积率)+R('管理状况',info.管理状况);
  var mp=mapHTML(info.地址,o.物件名称);
  var detailCard=(detail||mp)?`<div class="tcard"><h3>📍 物件资讯</h3>${detail}${mp}</div>`:'';
  var an=o.分析||{};var ya=String(an.利回分析||'').trim(),pros=String(an.优点||'').trim(),cons=String(an.缺点||'').trim();
  var analysisCard='';
  if(ya||pros||cons){
    var inner='';
    if(ya){var hy=Math.max(20,Math.ceil(ya.length*0.8));inner+=`<div style="margin-bottom:12px"><p style="font-weight:700;color:var(--rose-d);font-size:14px;margin-bottom:4px">📊 利回分析</p><p style="font-size:14px;color:#44403c;white-space:pre-line">${teaser(ya,hy)}</p></div>`;}
    if(pros){var hp=Math.max(16,Math.ceil(pros.length*0.82));inner+=`<div style="margin-bottom:12px"><p style="font-weight:700;color:var(--green-d);font-size:14px;margin-bottom:4px">👍 优点</p><p style="font-size:14px;color:#44403c;white-space:pre-line">${teaser(pros,hp)}</p></div>`;}
    if(cons){var hc=Math.max(24,Math.ceil(cons.length*0.7));inner+=`<div><p style="font-weight:700;color:#b45309;font-size:14px;margin-bottom:4px">⚠️ 需要留意（可再确认）</p><p style="font-size:14px;color:#44403c;white-space:pre-line">${teaser(cons,hc)}</p></div>`;}
    inner+=`<div class="locktip">🔒想了解完整投报与收益试算？<br><a href="${LINE}" target="_blank" rel='noopener'>加周周 LINE</a>，我帮你把这个收租物件详细试算一遍。</div>`;
    analysisCard=`<div class="tcard"><h3>🔍 投资分析（周周视角）</h3>${inner}</div>`;
  }
  var sup=String(o.补充||'').trim();var link=String(o.连结资讯||'').trim();var hasLink=link&&link.indexOf('未标示')<0;
  var supCard=(sup||hasLink)?`<div class="tcard" style="background:#f5f5f4"><h3>📋 其他补充重点</h3>${sup?`<p style="font-size:14px;color:#44403c;white-space:pre-line">${esc(sup)}</p>`:''}${hasLink?`<p style="font-size:14px;color:#44403c;margin-top:8px">🔗 图面上的连结／QR／其他资讯：<br>${linkify(link)}</p>`:''}</div>`:'';
  var html=`${preview?`<div class="tcard" style="padding:12px"><p style="font-size:12px;color:var(--mut);margin:0 4px 8px">你上传的原始图面</p><img src="${preview}" style="width:100%;border-radius:12px"></div>`:`<div class="tcard" style="font-size:14px;color:var(--mut)">已上传档案：${file?esc(file.name):''}</div>`}
<div class="tcard">${t?`<span class="badge">${esc(t)}</span><br>`:''}<p style="font-size:12px;color:var(--mut);margin-bottom:4px">物件名称</p><h2 style="font-size:20px;margin-bottom:2px">${esc(o.物件名称)||'图面未标示'}</h2></div>
${yieldCard}
${moneyCard}
${incomeCard}
${detailCard}
${analysisCard}
${supCard}
<button class="btn btn-g" style="width:100%;justify-content:center;margin-top:14px" onclick="reset()">↺ 分析另一份图面</button>
<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:16px;margin-top:14px;text-align:center"><p style="font-size:15px;color:#b45309;font-weight:700;line-height:1.7">※ AI 翻译与利回仅供参考，可能有误差<br>投报率与收益务必以原始资料与周周再次确认喔！</p></div>
<div style="border-top:1px solid var(--line);margin-top:18px;padding-top:18px;text-align:center"><p style="font-size:14px">本工具制作者：<b>周欣妤（周周）</b></p><p style="font-size:14px;color:var(--mut)">公司：株式会社アンドプラス</p><a class="btn btn-line" href="${LINE}" target="_blank" style="margin-top:12px" rel='noopener'>想要咨询？点此联系周周</a></div>`;
  var R2=document.getElementById('result');R2.innerHTML=html;R2.style.display='block';document.getElementById('upload').style.display='none';window.scrollTo({top:0,behavior:'smooth'});}
const dz=document.getElementById('drop');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--rose)';});
dz.addEventListener('dragleave',()=>dz.style.borderColor='');
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';pick(e.dataTransfer.files[0]);});
</script>
