const LINE="https://lin.ee/RscRWCp";
const PROMPT=`你是協助台灣客戶看懂日本房地產販售圖面的專家。閱讀這份日文物件資料，整理成繁體中文。只輸出 JSON：{"物件類型":"","物件名稱":"","房間格局":"","專有面積":"","陽台面積":"","土地面積":"","建物面積":"","周邊環境":"","翻新":"","金額":{"販售價格":"","管理費":"","修繕基金":"","其他費用":""},"物件資訊":{"地址":"","建築年月":"","交通":"","建築構造":"","管理型態":"","管理公司":"","總戶數":""},"分析":{"優點":"","缺點":""},"補充":"","連結資訊":""}
規則：
- 【第一步・最優先判斷｜從嚴】這張圖必須是「日本房地產販售圖面／マイソク」——圖面上要**用文字明確印出**販售資料：至少要同時看得到「**價格**」以及「格局／面積／地址／戶數」等物件規格文字（通常還會有間取圖）。**只要符合以下任一種，一律只輸出 {"not_property": true} 並結束**：①主要是照片（房間實景照、外觀照、風景、街景、人物）；②圖上沒有明確印出的「價格」文字；③看不到成套的物件規格文字；④菜單、地圖截圖、廣告或其他無關圖。**【嚴禁瞎掰】就算你覺得「認得」這個建案、或看得出格局，也絕對不可以憑印象、記憶或猜測，填入物件名、地址、價格、戶數、屋齡、交通等任何資料——所有內容都必須是這張圖上『真的印出來的文字』。只要沒有印出的販售文字，就是 not_property；寧可回報不是物件圖，也絕不准編造。**
- 【第二步判斷】如果這其實是「投資物件」，不要用住宅格式，直接只輸出 {"switch_to":"invest"} 就結束。以下全都算投資物件：①収益物件／オーナーチェンジ／年間賃料等收益資料；②有寫任何利回（表面利回／実質利回／利回り）；③旅館・ホテル・民泊・簡易宿所・ゲストハウス・宿泊施設 等住宿營運物件；④整棟（一棟マンション／一棟アパート／一棟ビル／一棟）。（系統會自動改用投資格式重新分析，避免放錯。）
- 【最高優先・務必遵守】除了「物件名稱」（見下一條）外，所有欄位內容一律用繁體中文（台灣用語）。**絕對禁止出現日文假名（平假名／片假名），也絕對禁止用英文或羅馬拼音代替**。日文漢字詞換成台灣看得懂的說法。輸出前逐欄自我檢查，發現假名或英文就改成中文。特別注意「周邊環境」「翻新」「補充」最常殘留，務必全部中文化。
- 物件名稱（唯一例外）：**保留日文原文，後面用（）附上中文翻譯或讀音**。例如：オークプレス目黒行人坂（歐克普雷斯目黑行人坂）／ザ・パークハウス目黒（The Parkhouse 目黑）。
- 【地名/車站/建物名一律用中文漢字，嚴禁英文化/羅馬拼音】：小山台 就寫「小山台」不可寫 Koyama-dai；品川区→品川區；恵比寿→惠比壽；○○駅→○○站。**不要輸出英文句子，也不要在中文後面用括號再重複一次英文**。
- 【設施類一律翻繁體中文】：小学校→小學／中学校→國中／高校→高中／幼稚園→幼稚園／保育園→托兒所／公園→公園／病院→醫院／商店街→商店街／クリニック→診所／スーパー→超市／ドラッグストア→藥妝店。
- 店名／品牌：有通用中文就用中文（ローソン→羅森／ファミリーマート→全家／セブンイレブン→7-ELEVEN／業務スーパー→業務超市／マツモトキヨシ→松本清藥妝店／ドン・キホーテ→唐吉訶德）；**沒有通用中文的日文店名，保留日文原名即可，但絕不可翻成英文或羅馬拼音**（例如 ライフ、オオゼキ 這種就照原樣，不要寫成 Life、Oseki）。
- 裝修／設備詞一律翻中文：クロス（張り替え）→壁紙(壁布)更換／フローリング（上張り）→木地板(加鋪)／給湯器→熱水器／リフォーム→翻新／リノベーション→改裝翻新／室内クリーニング・清掃→室內清潔／間取り→格局／和室→和室(榻榻米房)／洋室→洋式房間／システムキッチン→系統廚具／ユニットバス→整體衛浴。
- 補充常見詞一律翻中文：引渡し→交屋／相談→面議(可洽談)／空室→空屋／更地→空地／現況→目前狀況／私道負担→私設道路分攤／本下水→公共下水道／都市ガス→都市瓦斯／プロパンガス→桶裝瓦斯／駐車場→停車場。
- 全部繁體中文，請用台灣人習慣的用詞（例如：公寓、一戶建、車站、徒步、坪數、屋齡）。地名、車站、物件名稱可保留原文（但「周邊環境」欄位要翻成中文，見下方規則）。
- 物件類型判斷為「公寓」「一戶建」「土地」或「其他」。公寓：填專有面積、陽台面積、管理費、修繕基金、管理型態、管理公司、總戶數。一戶建：填土地面積、建物面積；管理相關欄位填「圖面未標示」。土地：填土地面積；房間格局與建物相關欄位填「圖面未標示」。
- 一戶建（透天）若各樓層面積不同，「建物面積」欄位請寫清楚每層樓的大小，每層獨立一行，例如「1樓 12.5坪\n2樓 10.8坪\n3樓 6.2坪」，方便客戶看每層空間。
- 地址盡量完整（都道府縣市區町村番地），此欄會用來顯示地圖，務必準確；只判讀得出部分就填部分，完全無法判讀填「圖面未標示」。
- 交通：寫最近車站與徒步分鐘。把「駅」翻成「車站」或「站」。若有多條路線或多個車站，請「每個車站獨立一行」，用換行分隔。範例：
JR山手線・JR京濱東北線・東急目黑線「目黑」站 徒步10分
JR山手線・JR京濱東北線・東急目黑線「惠比壽」站 徒步12分
- 周邊環境：列出最近的學校、便利商店、超市、公園、醫院等生活機能，盡量標徒步分鐘數。**全部用繁體中文**：地名保留中文漢字（小山台 就寫小山台，不要 Koyama-dai）、設施類翻中文（○○小学校→○○小學、○○中学校→○○國中、○○商店街→○○商店街、○○公園→○○公園）、店名有中文用中文（業務スーパー→業務超市、ファミリーマート→全家）。**嚴禁整句英文、嚴禁把地名翻成英文、嚴禁在中文後面括號重複英文**。沒有中文名的日文店名就保留日文原名、不要英文化。每項獨立一行、開頭加「・」（圖面有寫才寫，沒寫不要編）。
- 建築年月要含完工年月（例：2003年3月）。
- 建築構造：寫材料與樓層，格式為「材料造／地下X樓、地上Y樓建」，材料用中文（鋼筋混凝土造／鋼骨造／木造，不要用RC/SRC、不要用「階」要用「樓」）。範例：鋼筋混凝土造／地下1樓、地上5樓建。
- 翻新：特別注意圖面是否有「新規內裝／リフォーム／リノベーション／リノベ／フルリフォーム／改裝」等字樣。有的話務必寫出翻新範圍與內容（廚房、衛浴、地板、壁紙、給排水管線等），全部寫繁體中文、不要出現任何日文，每項獨立一行、開頭加「・」，越具體越好，這是重要加分項。沒有就填「圖面未標示」。
- 分析「優點」：站在房仲角度，大方寫出所有賣點（地點、價格、格局、採光、翻新、生活機能、車站距離等），可以寫詳細一點，每點獨立一行、開頭加「・」。

function kata2romaji(run){
  var s=run.replace(/[ァ-ヶ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0x60);}).replace(/ー/g,'ー');
  var out='',i=0;
  while(i<s.length){
    var two=s.substr(i,2);
    if(HK[two]){out+=HK[two];i+=2;continue;}
    var c=s[i];
    if(c==='っ'){var nx=HK[s.substr(i+1,2)]||HK[s[i+1]]||'';if(nx)out+=nx[0];i++;continue;}
    if(c==='ー'){if(out)out+=out[out.length-1];i++;continue;}

  return out?out.charAt(0).toUpperCase()+out.slice(1):out;

function zhErr(msg){const s=String(msg||'');
  if(/上限|暫停|已達|已滿|每人每日|請聯繫周周|加\s*LINE/.test(s))return s; // Worker 的中文上限訊息直接顯示
  if(/high demand|overload|try again later|UNAVAILABLE|503/i.test(s))return 'Gemini 現在使用量較大，請等幾秒再按一次「開始翻譯分析」';
  if(/quota|RESOURCE_EXHAUSTED|429|exceed/i.test(s))return '免費額度暫時達到上限（連續太快會這樣），請等 1~2 分鐘再按一次';
  if(/API.?key|invalid|PERMISSION/i.test(s))return '後端金鑰設定有誤，請確認 Cloudflare 設定';
  if(/fetch|network|Failed to/i.test(s))return '連線不穩，請再按一次「開始翻譯分析」';
  if(/截斷|Unterminated|token|JSON/i.test(s))return 'AI 回答被截斷，請再按一次重試';
  if(/格式/.test(s))return s;
  return '發生錯誤，請再試一次（'+s+'）';}

function teaser(text,headLen){text=String(text||'').trim();if(!text)return'';if(text.length<=headLen)return esc(text)+'<span class="blurtxt">　　　　詳細分析請洽周周喔</span>';return esc(text.slice(0,headLen))+'<span class="blurtxt">'+esc(text.slice(headLen))+'</span>';}
async function callWorker(body){let last;for(let i=0;i<3;i++){try{const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();
      // 額度/限流錯誤：不要重試！重試只會在一分鐘內再多打幾次，反而更快撞上每分鐘上限。直接回傳讓使用者稍等。
      if(j&&j.error&&/quota|resource_exhausted|429|exceed/i.test(j.error))return j;
      // 只有「伺服器暫時忙線」(503/overload) 才重試，且間隔拉長、次數減少。
      if(j&&j.error&&/high demand|overload|unavailable|503|try again|busy/i.test(j.error)){last=new Error(j.error);await delay(3000*(i+1));continue;}
      return j;}catch(e){last=e;await delay(1500);}}return{error:(last&&last.message)?last.message:'伺服器忙線，請稍後再試'};}

function logUpload(o,proc,paid,cost){
  if(!o)return;
  try{
    var p=(location.pathname.split('/').pop()||'');
    var lang=/-cn\./.test(p)?'簡中':(/-ja\./.test(p)?'日文':'繁中');
    var info=o.物件資訊||{},money=o.金額||{};
    var payload={log:1, paid:(paid?1:0), cost:(+cost||0), mode:(mode==='invest'?'投資物件':'住宅物件'), lang:lang,
      "類型":String(o.物件類型||''), "物件名稱":String(o.物件名稱||''),
      "地址":String(info.地址||''), "交通":String(info.交通||''),
      "價格":String(money.販售價格||money.年間賃料收入||''),
      "利回":String((o.利回&&o.利回.表面利回)||'')};
    if(proc&&proc.data){payload.img=proc.data;payload.imgType=proc.mediaType||'image/jpeg';} // 原圖(已壓縮)一起存
    fetch(WORKER_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  }catch(_){}
}

async function go(){
  if(!file)return;
  const now=Date.now();
  let times=_thGet().filter(t=>now-t<600000); // 只看近 10 分鐘
  const b=document.getElementById('goBtn');
  // 超過總量：偽裝成「系統忙碌」並順勢導 LINE，不明說是限制
  if(times.length>=WINDOW_MAX){showErr('系統整理中，請過幾分鐘再試～ 想更快的話，直接把圖傳到周周 LINE，我幫你看更快 💬');return;}
  if(b){b.disabled=true;b.textContent='努力分析中…';}
  showLoad(true);
  document.getElementById('err').style.display='none';
  // 距離上次太近：先靜靜等一下（畫面停在「分析中…」，看起來只是還在處理）
  const lastT=times.length?times[times.length-1]:0;
  const wait=Math.max(0,MIN_GAP-(now-lastT));
  if(wait>0)await delay(wait);
  times.push(Date.now());_thSet(times);
  if(typeof gtag==='function'){try{gtag('event','translate_start',{mode:mode});}catch(_){}}
  try{
    const proc=await processImage(file);
    let o=null,switched=false,paidFlag=0,costVal=0;
    for(let attempt=0;attempt<2;attempt++){
      const j=await callWorker({data:proc.data,mediaType:proc.mediaType,prompt:(mode==='invest'?INVEST_PROMPT:PROMPT)});
      if(j.error)throw new Error(j.error);
      paidFlag=j.paid?1:0; // 後端回傳：這張有沒有用到付費金鑰（免費爆量才會=1）
      costVal=j.cost||0;   // 這張的實際花費(美元，依 token 計)
      try{o=JSON.parse(String(j.text||'').replace(/```json|```/g,'').trim());}catch(pe){throw new Error('截斷');}
      if(!o||typeof o!=='object')throw new Error('回傳格式異常，請重試');
      if(o.not_property){ if(typeof gtag==='function'){try{gtag('event','translate_notproperty');}catch(_){}} showErr('🙈 這看起來不是「物件販售圖面」喔！請上傳日文的物件販賣資料圖（マイソク，上面有價格、格局、面積那種）；房間照片、風景照、外觀照沒辦法分析～'); return; }
      // 自動判斷：若其實是另一種物件類型，切換模式重新分析一次（避免客戶選錯模式放錯回覆）
      if(!switched && (o.switch_to==='invest'||o.switch_to==='home') && o.switch_to!==mode){ mode=o.switch_to; setMode(mode); switched=true; continue; }
      break;
    }
    var _nm=o.物件名稱; o=deepClean(o); if(_nm!=null)o.物件名稱=_nm; // 清洗殘留日文；物件名稱刻意保留日文原文＋(中文)
    if(typeof gtag==='function'){try{gtag('event','translate_done',{mode:mode,ptype:String(o.物件類型||'')});}catch(_){}}
    logUpload(o,proc,paidFlag,costVal); // 統整到 Cloudflare(含原圖)，周周後台 /admin/logs.html 看得到
    (mode==='invest'?showInvestResult(o):showResult(o));
  }catch(e){
    var raw=(e&&e.message)?e.message:String(e);
    try{console.log('[translate error]',raw);}catch(_){}
    var msg='分析失敗：'+zhErr(raw);
    if(/debug/i.test(location.search+location.hash))msg+='　〔debug｜原始錯誤：'+raw+'〕';
    showErr(msg);
  }
}

function setMode(m){mode=m;var bs=document.querySelectorAll('.modesel .mode');for(var i=0;i<bs.length;i++){bs[i].classList.toggle('on',bs[i].getAttribute('data-mode')===m);}var h=document.getElementById('modehint');if(h)h.textContent=(m==='invest'?'投資（收租）物件：抓出表面利回並推估實質利回，收益與物件資訊有寫才顯示。':'住宅自住物件：格局、面積、管理費、周邊生活機能等。');}
function pctNum(s){var m=String(s||'').match(/(\d+(?:\.\d+)?)\s*%/);return m?parseFloat(m[1]):null;}
function mapHTML(addr,name){addr=String(addr||'');name=String(name||'');var addrOk=addr.trim()&&addr.indexOf('未標示')<0;var nameOk=name.trim()&&name.indexOf('未標示')<0;var mapQ=addrOk?addr:(nameOk?name:'');var byName=!addrOk&&nameOk;if(!mapQ)return '';return `<div style="margin-top:14px"><div style="border-radius:12px;overflow:hidden;border:1px solid var(--line)"><iframe width="100%" height="200" style="border:0;display:block" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=${encodeURIComponent(mapQ)}&output=embed"></iframe></div><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mapQ)}" target="_blank" style="display:inline-block;margin-top:8px;font-size:13px;color:var(--rose);font-weight:500" rel='noopener'>📍 在 Google 地圖開啟這個位置 →</a><p style="font-size:12px;color:var(--mut);margin-top:4px">※ ${byName?'圖面找不到地址，這是用「物件名稱」找的位置，':'地圖位置由 AI 依圖面地址自動判讀，'}可能有誤，請以原始資料為準。</p></div>`;}
function showInvestResult(o){
  o=o||{};var m=o.金額||{},li=o.利回||{},inc=o.收益資訊||{},info=o.物件資訊||{};var t=String(o.物件類型||'');
  function R(k,v){var e=!v||!String(v).trim()||String(v).indexOf('未標示')>=0;return e?'':rowf(k,v);}
  var surfN=pctNum(li.表面利回);
  var realActual=String(li.實質利回||'').trim();var realOk=realActual&&realActual.indexOf('未標示')<0;
  var realEst=(surfN!=null)?(Math.round(surfN*0.7944*10)/10)+'%（估）':'';
  var realShow=realOk?li.實質利回:realEst;
  var payback=(surfN!=null&&surfN>0)?(Math.round(100/surfN*10)/10)+' 年':'';
  var ybox=function(k,v,big){var e=!v||!String(v).trim();return `<div class="ybox${big?' big':''}"><div class="k">${k}</div><div class="v"${e?' style="color:#d6d3d1;font-size:14px"':''}>${e?'未標示':esc(v)}</div></div>`;};
  var ygrid=ybox('表面利回（毛）',li.表面利回,true);
  if(surfN!=null){ygrid+=ybox('實質利回（估・經費15%）',realShow)+ybox('表面回收年數（毛）',payback);}
  var yieldCard=`<div class="ycard"><h3>📈 利回（投報率）</h3><div class="ygrid">${ygrid}</div><p style="font-size:12px;color:var(--mut);margin-top:10px;line-height:1.6">※「實質利回（估）」以經費率15%、購入諸費用7%推估（約表面的0.79倍），僅供參考、非保證；表面利回未扣管理／修繕／空室／稅金，實際到手會更低。請以原始資料與周周確認。</p></div>`;
  var money=R('販售價格',m.販售價格)+R('年間賃料收入',m.年間賃料收入)+R('月額賃料收入',m.月額賃料收入)+R('管理／營運支出',m.管理營運支出);
  var moneyCard=money?`<div class="tcard"><h3>💰 金額・收益</h3>${money}</div>`:'';
  var income=R('總戶數',inc.總戶數)+R('入居狀況',inc.入居狀況)+R('格局構成',inc.格局構成)+R('建物構造／材料',inc.建物構造)+R('建築年月',inc.建築年月)+R('土地面積',inc.土地面積)+R('建物面積',inc.建物面積);
  var incomeCard=income?`<div class="tcard"><h3>🏢 收益資訊</h3>${income}</div>`:'';
  var detail=R('地址',info.地址)+R('交通／車站',info.交通)+R('用途地域',info.用途地域)+R('建蔽率／容積率',info.建蔽率容積率)+R('管理狀況',info.管理狀況);
  var mp=mapHTML(info.地址,o.物件名稱);
  var detailCard=(detail||mp)?`<div class="tcard"><h3>📍 物件資訊</h3>${detail}${mp}</div>`:'';
  var an=o.分析||{};var ya=String(an.利回分析||'').trim(),pros=String(an.優點||'').trim(),cons=String(an.缺點||'').trim();
  var analysisCard='';
  if(ya||pros||cons){
    var inner='';
    if(ya){var hy=Math.max(20,Math.ceil(ya.length*0.8));inner+=`<div style="margin-bottom:12px"><p style="font-weight:700;color:var(--rose-d);font-size:14px;margin-bottom:4px">📊 利回分析</p><p style="font-size:14px;color:#44403c;white-space:pre-line">${teaser(ya,hy)}</p></div>`;}
    if(pros){var hp=Math.max(16,Math.ceil(pros.length*0.82));inner+=`<div style="margin-bottom:12px"><p style="font-weight:700;color:var(--green-d);font-size:14px;margin-bottom:4px">👍 優點</p><p style="font-size:14px;color:#44403c;white-space:pre-line">${teaser(pros,hp)}</p></div>`;}
    if(cons){var hc=Math.max(24,Math.ceil(cons.length*0.7));inner+=`<div><p style="font-weight:700;color:#b45309;font-size:14px;margin-bottom:4px">⚠️ 需要留意（可再確認）</p><p style="font-size:14px;color:#44403c;white-space:pre-line">${teaser(cons,hc)}</p></div>`;}
    inner+=`<div class="locktip">🔒想了解完整投報與收益試算？<br><a href="${LINE}" target="_blank" rel='noopener'>加周周 LINE</a>，我幫你把這個收租物件詳細試算一遍。</div>`;
    analysisCard=`<div class="tcard"><h3>🔍 投資分析（周周視角）</h3>${inner}</div>`;
  }
  var sup=String(o.補充||'').trim();var link=String(o.連結資訊||'').trim();var hasLink=link&&link.indexOf('未標示')<0;
  var supCard=(sup||hasLink)?`<div class="tcard" style="background:#f5f5f4"><h3>📋 其他補充重點</h3>${sup?`<p style="font-size:14px;color:#44403c;white-space:pre-line">${esc(sup)}</p>`:''}${hasLink?`<p style="font-size:14px;color:#44403c;margin-top:8px">🔗 圖面上的連結／QR／其他資訊：<br>${linkify(link)}</p>`:''}</div>`:'';
  var html=`${preview?`<div class="tcard" style="padding:12px"><p style="font-size:12px;color:var(--mut);margin:0 4px 8px">你上傳的原始圖面</p><img src="${preview}" style="width:100%;border-radius:12px"></div>`:`<div class="tcard" style="font-size:14px;color:var(--mut)">已上傳檔案：${file?esc(file.name):''}</div>`}
<div class="tcard">${t?`<span class="badge">${esc(t)}</span><br>`:''}<p style="font-size:12px;color:var(--mut);margin-bottom:4px">物件名稱</p><h2 style="font-size:20px;margin-bottom:2px">${esc(o.物件名稱)||'圖面未標示'}</h2></div>
${yieldCard}
${moneyCard}
${incomeCard}
${detailCard}
${analysisCard}
${supCard}
<button class="btn btn-g" style="width:100%;justify-content:center;margin-top:14px" onclick="reset()">↺ 分析另一份圖面</button>
<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:16px;margin-top:14px;text-align:center"><p style="font-size:15px;color:#b45309;font-weight:700;line-height:1.7">※ AI 翻譯與利回僅供參考，可能有誤差<br>投報率與收益務必以原始資料與周周再次確認喔！</p></div>
<div style="border-top:1px solid var(--line);margin-top:18px;padding-top:18px;text-align:center"><p style="font-size:14px">本工具製作者：<b>周欣妤（周周）</b></p><p style="font-size:14px;color:var(--mut)">公司：株式会社アンドプラス</p><a class="btn btn-line" href="${LINE}" target="_blank" style="margin-top:12px" rel='noopener'>想要諮詢？點此聯繫周周</a></div>`;
  var R2=document.getElementById('result');R2.innerHTML=html;R2.style.display='block';document.getElementById('upload').style.display='none';window.scrollTo({top:0,behavior:'smooth'});}
const dz=document.getElementById('drop');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--rose)';});
dz.addEventListener('dragleave',()=>dz.style.borderColor='');
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';pick(e.dataTransfer.files[0]);});
</script>
