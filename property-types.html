function esc(s){return s;}
function render(){
  var host = document.getElementById('host'), html='';
  CATS.forEach(function(c){
    html += '<div class="sech"><span class="n">'+c.n+'</span><h2>'+c.title+'</h2></div>';
    if(c.intro) html += '<div class="secintro">💡 '+c.intro+'</div>';
    c.items.forEach(function(it,i){
      var id='acc-'+c.n+'-'+i;
      html += '<div class="acc" id="'+id+'"><div class="acc-h" onclick="document.getElementById(\''+id+'\').classList.toggle(\'open\')">'
        + '<span class="ic">'+it.ic+'</span><span class="tt"><b>'+it.name+'</b><span>'+it.sub+'</span></span><span class="arw">▼</span></div>'
        + '<div class="acc-body">'
        + '<div class="def">'+it.def+'</div>'
        + blk('feat','🔎 特徵', it.feat)
        + blk('pro','✔ 主要優點', it.pro)
        + blk('warn','⚠ 注意事項', it.warn)
        + blk('fit','♥ 適合', it.fit)
        + '</div></div>';
    });
  });
  host.innerHTML = html;
}
function blk(cls,head,arr){
  var h='<div class="blk '+cls+'"><div class="bh">'+head+'</div><ul>';
  arr.forEach(function(x){ h+='<li>'+x+'</li>'; });
  return h+'</ul></div>';
}
render();
</script>
