*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
.sbar{background:#fff;border-bottom:1px solid var(--line)}
.wrap{max-width:600px;margin:0 auto;padding:0 16px}a{color:inherit}
.btn-line{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:none;border-radius:12px;font-weight:500;cursor:pointer;font-size:15px;padding:11px 22px;text-decoration:none}.btn-line:hover{background:var(--green-d)}
.back{display:inline-block;color:var(--mut);font-size:14px;margin:14px 0}
.top{text-align:center;margin-bottom:18px}.top h1{font-size:25px}.top p{color:var(--mut);font-size:14px;margin-top:6px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:18px}
.f{margin-bottom:15px}.f label{display:block;font-size:13px;color:var(--mut);font-weight:600;margin-bottom:6px}
.f input,.f select,.f textarea{width:100%;border:1px solid var(--line);background:#f5f5f4;border-radius:12px;padding:11px 13px;font-size:15px;font-family:inherit;color:var(--ink);outline:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--rose);background:#fff}
.f textarea{min-height:130px;resize:vertical;line-height:1.7}
.req{color:var(--rose)}
.submit{width:100%;background:var(--rose);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:16px;padding:13px;cursor:pointer;font-family:inherit}
.submit:hover{background:var(--rose-d)}

.line-wrap{text-align:center}
.note{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:12px;padding:11px 14px;font-size:12.5px;margin-top:14px;line-height:1.7}
.foot{text-align:center;color:var(--mut);font-size:12px;margin:8px 0 30px}

<div class="sbar"><div class="wrap" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px"><a href="index.html" style="font-weight:800;color:var(--rose);font-size:17px">周周・日本房仲</a><a class="btn-line" href="https://lin.ee/RscRWCp" target="_blank" rel="noopener">加 LINE 諮詢</a></div></div>
<div class="wrap">
  <a class="back" href="index.html">← 回周周首頁</a>
  <div class="top"><h1>💬 意見回饋</h1><p>網站、文章或服務有任何想法、建議，都歡迎告訴周周，幫我把這裡做得更好！</p></div>
  <div class="card">
    <form onsubmit="return sendFb(event)">
      <div class="f"><label>回饋類型</label><select id="fb_type"><option>網站／使用建議</option><option>文章內容回饋</option><option>找房／買房諮詢</option><option>合作邀約</option><option>其他</option></select></div>
      <div class="f"><label>你的稱呼（選填）</label><input id="fb_name" type="text" placeholder="怎麼稱呼你？"></div>
      <div class="f"><label>聯絡方式（選填，方便周周回覆）</label><input id="fb_contact" type="text" placeholder="LINE ID／Email／電話"></div>
      <div class="f"><label>回饋內容 <span class="req">*</span></label><textarea id="fb_msg" placeholder="想說的話都可以寫在這裡…" required></textarea></div>
      <button class="submit" type="submit">📨 送出回饋</button>
    </form>
    <div class="or">— 或 —</div>
    <div class="line-wrap"><a class="btn-line" id="lineFb" href="https://lin.ee/RscRWCp" target="_blank" rel="noopener">💬 直接用 LINE 告訴周周</a></div>
    <div class="note">📩 點「送出回饋」會開啟你的 Email 把內容寄給周周（s-syu@and-p.jp）。若手機沒有設定 Email，建議直接用上面的 LINE 傳給我最快。</div>
  </div>
  <p class="foot">© 2026 周周・日本房仲</p>
</div>
<script>
function sendFb(e){e.preventDefault();
  var type=document.getElementById('fb_type').value;
  var name=document.getElementById('fb_name').value.trim()||'匿名';
  var contact=document.getElementById('fb_contact').value.trim()||'未提供';
  var msg=document.getElementById('fb_msg').value.trim();
  if(!msg){alert('請填寫回饋內容');return false;}
  var subj='【網站意見回饋】'+type;
  var body='回饋類型：'+type+'\n稱呼：'+name+'\n聯絡方式：'+contact+'\n\n內容：\n'+msg;
  window.location.href='mailto:s-syu@and-p.jp?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
  return false;
}
document.addEventListener("click",function(e){var a=e.target.closest&&e.target.closest("a");if(a&&a.href&&a.href.indexOf("lin.ee")>-1&&typeof gtag==="function"){gtag("event","line_click",{link_id:a.id||"",page:location.pathname});}});
</script>
