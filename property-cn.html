<style>
:root{--rose:#f43f5e;--rose-d:#e11d48;--green:#10b981;--green-d:#059669;--ink:#292524;--mut:#78716c;--bg:#fafaf9;--line:#e7e5e4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;font-size:16px}
a{color:inherit}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}

/* 详细版面 */
.pdetail{display:flex;gap:38px;flex-wrap:wrap;align-items:flex-start}
.pgal{flex:1 1 540px;min-width:0}
.pmain{position:relative;background:#f5f5f4;border-radius:16px;overflow:hidden;height:clamp(320px,54vh,560px);cursor:zoom-in}
.pmain img{width:100%;height:100%;object-fit:cover;display:block}
.pmain .pnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.42);color:#fff;border:none;font-size:30px;cursor:pointer;padding:8px 14px;line-height:1;font-family:inherit;border-radius:10px}
.pmain .pnav:hover{background:rgba(0,0,0,.72)}
.pmain .pnav.prev{left:12px}.pmain .pnav.next{right:12px}
.pmain .pcnt{position:absolute;bottom:11px;right:13px;background:rgba(0,0,0,.6);color:#fff;font-size:12.5px;padding:3px 11px;border-radius:999px}
.pmain .pzoom{position:absolute;bottom:11px;left:13px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;padding:3px 10px;border-radius:999px;pointer-events:none}
.pthumbs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:4px}
.pthumbs img{width:88px;height:66px;object-fit:cover;border-radius:8px;cursor:pointer;opacity:.55;flex-shrink:0;border:2px solid transparent}
.pthumbs img.on{opacity:1;border-color:var(--rose)}
.pnoimg{height:360px;border-radius:16px;background:linear-gradient(135deg,#fde8ee,#fbeff2);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e7a9ba;gap:8px}
.pnoimg span{font-size:52px}
/* 资讯栏 */
.pbody{flex:1 1 360px;min-width:0}
.ptitle{font-size:24px;font-weight:900;line-height:1.4}
.ptitle .cn{display:block;font-size:16px;font-weight:500;color:var(--mut);margin-top:6px;letter-spacing:.3px}
.pbadges{display:flex;gap:8px;margin:16px 0 2px}
.pbadges span{font-size:12.5px;font-weight:700;padding:4px 13px;border-radius:999px}
.pbadges .b{color:#fff;background:var(--green)}.pbadges .b.s2{background:#f59e0b}.pbadges .b.s3{background:#9ca3af}
.pbadges .t{background:#fff1f2;color:var(--rose-d)}
.pprice{font-size:32px;font-weight:900;color:var(--rose-d);margin:14px 0 20px}
.pfacts{display:flex;flex-wrap:wrap;gap:9px;margin:16px 0 20px}
.pfacts span{background:#f8f7f6;border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:13px;color:#44403c;line-height:1.4}
.pfacts span b{display:block;color:#a8a29e;font-weight:500;font-size:11px;margin-bottom:2px}
.pspec{list-style:none;border-top:1px solid var(--line)}
.pspec li{display:flex;gap:18px;align-items:flex-start;padding:14px 2px;border-bottom:1px solid #f5f5f4;font-size:14.5px;color:#44403c;line-height:1.75}
.pspec li b{min-width:60px;color:#a8a29e;font-weight:500;flex-shrink:0}
.pmap{display:inline-flex;align-items:center;gap:7px;margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600;color:#57534e;text-decoration:none}
.pmap:hover{border-color:var(--rose);color:var(--rose-d)}
.pnote{background:rgba(244,63,94,.05);border-left:3px solid var(--rose);border-radius:10px;padding:16px 18px;font-size:14px;color:#57534e;margin:22px 0 6px;line-height:2}
.pnote .nh{display:block;font-weight:700;color:var(--rose-d);margin-bottom:7px;font-size:14.5px}
.pask{margin-top:22px;text-align:center;display:block;background:var(--green);color:#fff;font-weight:700;padding:15px;border-radius:999px;text-decoration:none;font-size:15.5px}
.pask:hover{background:var(--green-d)}
.pnotfound{text-align:center;padding:70px 20px;color:var(--mut)}
.pnotfound .big{font-size:46px;margin-bottom:14px}
.compliance{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:36px 0 10px;font-size:12.5px;color:var(--mut);line-height:1.9}
.compliance b{color:#57534e}
footer{background:#1c1917;color:#d6d3d1;margin-top:44px;padding:30px 0}
footer .wrap{display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;font-size:13px}
footer a{color:#d6d3d1;text-decoration:none}
/* 全萤幕放大 */
.zoom{position:fixed;inset:0;z-index:130;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;padding:20px}
.zoom.on{display:flex}
.zoom img{max-width:96vw;max-height:90vh;object-fit:contain;border-radius:6px}
.zoom .zx{position:absolute;top:14px;right:20px;color:#fff;font-size:34px;font-weight:700;cursor:pointer;line-height:1;background:none;border:none;font-family:inherit}
.zoom .znav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:48px;cursor:pointer;background:none;border:none;padding:10px 18px;line-height:1;font-family:inherit}
.zoom .znav.prev{left:1vw}.zoom .znav.next{right:1vw}
.zoom .zcnt{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#fff;font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.zoom .znav:hover,.zoom .zx:hover{opacity:.7}
body.noscroll{overflow:hidden}
@media(max-width:600px){.hnav .hide-sm{display:none}.pmain{height:300px}.ptitle{font-size:20px}.pprice{font-size:27px}.zoom .znav{font-size:34px;padding:8px 10px}}
/* 加 LINE 按钮字白色（避免被 .hnav a 盖成灰） */
.hnav .btn-line{color:#fff}
/* 浮动加 LINE 钮：滑到哪都看得到，脉动动画 */
.line-float{position:fixed;right:20px;bottom:20px;z-index:110;display:flex;align-items:center;gap:8px;background:var(--green);color:#fff;padding:13px 20px;border-radius:999px;font-weight:700;font-size:15px;text-decoration:none;box-shadow:0 6px 20px rgba(16,185,129,.45);transition:transform .15s,background .15s}

.line-float::before{content:"";position:absolute;inset:0;border-radius:999px;animation:lfpulse 2.4s infinite;pointer-events:none}
@keyframes lfpulse{0%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 14px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
@media(max-width:820px){.line-float{right:14px;bottom:14px;padding:12px 18px;font-size:14px}}

<script>
(function(){
  var CAT={invest:"投资收租",live:"自住",house:"一户建",land:"土地"};
  var SCLS={"在售":"","洽谈中":"s2","已成约":"s3"};
  var LINE="https://lin.ee/RscRWCp";
  var app=document.getElementById("app");
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  var conv=function(s){return s;};
  function C(s){return esc(conv(s==null?"":String(s)));}

  var photos=[],pi=0,pImg,pCnt,pThumbs;
  function getId(){try{return new URLSearchParams(location.search).get("id");}catch(e){var m=location.search.match(/[?&]id=([^&]+)/);return m?decodeURIComponent(m[1]):null;}}

  function notFound(){
    app.innerHTML='<div class="pnotfound"><div class="big">🏠</div>'
      +'<p>找不到这个物件，可能已成约或已下架。<br>欢迎回物件专区看看其他物件，或直接加 LINE 跟周周说你的需求。</p>'
      +'<div style="margin-top:20px"><a class="btn-line" href="properties-cn.html">← 回物件专区</a></div></div>';
  }

  function render(p){
    document.title=conv(p.title)+"｜周周・日本房仲";
    photos=(p.photos&&p.photos.length)?p.photos.slice():[];
    var gal;
    if(photos.length){
      var multi=photos.length>1;
      gal='<div class="pgal"><div class="pmain" id="pmain">'
        +'<img id="pimg" src="'+esc(photos[0])+'" alt="'+C(p.title)+'">'
        +(multi?'<button class="pnav prev" id="pprev" aria-label="上一张">‹</button><button class="pnav next" id="pnext" aria-label="下一张">›</button>':'')
        +'<span class="pcnt" id="pcnt">1 / '+photos.length+'</span>'
        +'<span class="pzoom">🔍 点图放大</span>'
        +'</div>'
        +(multi?'<div class="pthumbs" id="pthumbs">'+photos.map(function(src,idx){return '<img src="'+esc(src)+'" data-i="'+idx+'" alt="">';}).join("")+'</div>':'')
        +'</div>';
    } else {
      gal='<div class="pgal"><div class="pnoimg"><span>🏠</span><small>照片准备中，欢迎加 LINE 索取</small></div></div>';
    }
    var st=conv(p.status||"在售");
    var badges='<div class="pbadges"><span class="b '+(SCLS[st]||SCLS[p.status]||"")+'">'+esc(st)+'</span>'+(CAT[p.cat]?'<span class="t">'+CAT[p.cat]+'</span>':"")+'</div>';
    var cn=p.title_cn?'<span class="cn">'+C(p.title_cn)+'</span>':"";
    function row(l,v){return v?'<li><b>'+l+'</b><span>'+C(v)+'</span></li>':"";}
    function chip(l,v){return v?'<span><b>'+l+'</b>'+C(v)+'</span>':"";}
    var facts='<div class="pfacts">'+chip("格局",p.layout)+chip("面积",p.size)+chip("屋龄",p.age)+chip("投报",p.yield)+'</div>';
    var spec='<ul class="pspec">'
      +row("地点",p.location)+row("车站",p.station)+row("格局",p.layout)+row("面积",p.size)
      +row("屋龄",p.age)+row("朝向",p.facing)+row("管理",p.mgmt)+row("权利",p.right)+row("投报",p.yield)+'</ul>';
    var mapBtn=p.location?'<a class="pmap" href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.location)+'" target="_blank" rel="noopener">📍 在 Google 地图看位置</a>':"";
    var note=p.note?'<div class="pnote"><span class="nh">💬 周周的看法</span>'+C(p.note)+'</div>':"";
    var body='<div class="pbody">'
      +'<h1 class="ptitle">'+C(p.title)+cn+'</h1>'
      +badges
      +'<div class="pprice">'+C(p.price||"价格请洽询")+'</div>'
      +facts
      +spec+mapBtn+note
      +'<a class="pask" href="'+LINE+'" target="_blank" rel="noopener">＋ 加 LINE 询问这间</a>'
      +'</div>';
    app.innerHTML='<div class="pdetail">'+gal+body+'</div>';

    if(photos.length){
      pImg=document.getElementById("pimg"); pCnt=document.getElementById("pcnt"); pThumbs=document.getElementById("pthumbs");
      document.getElementById("pmain").addEventListener("click",function(e){ if(e.target.closest(".pnav"))return; openZoom(); });
      var pv=document.getElementById("pprev"),nx=document.getElementById("pnext");
      if(pv)pv.onclick=function(e){e.stopPropagation();step(-1);};
      if(nx)nx.onclick=function(e){e.stopPropagation();step(1);};
      if(pThumbs)pThumbs.addEventListener("click",function(e){var t=e.target.closest("img[data-i]");if(t){pi=+t.getAttribute("data-i");show();}});
    }
  }
  function show(){
    if(!pImg)return;
    pImg.src=photos[pi]; if(pCnt)pCnt.textContent=(pi+1)+" / "+photos.length;
    if(pThumbs)Array.prototype.forEach.call(pThumbs.children,function(t,idx){t.classList.toggle("on",idx===pi);var a=pThumbs.children[pi];if(a&&a.scrollIntoView)a.scrollIntoView({inline:"nearest",block:"nearest"});});
    if(zImg&&zoom.classList.contains("on")){zImg.src=photos[pi];zCnt.textContent=(pi+1)+" / "+photos.length;}
  }
  function step(d){ if(!photos.length)return; pi=(pi+d+photos.length)%photos.length; show(); }

  // 全萤幕放大
  var zoom=null,zImg,zCnt;
  function buildZoom(){
    zoom=document.createElement("div"); zoom.className="zoom";
    zoom.innerHTML='<button class="zx" aria-label="关闭">×</button>'
      +'<button class="znav prev" aria-label="上一张">‹</button>'
      +'<img alt=""><div class="zcnt"></div>'
      +'<button class="znav next" aria-label="下一张">›</button>';
    document.body.appendChild(zoom);
    zImg=zoom.querySelector("img"); zCnt=zoom.querySelector(".zcnt");
    zoom.querySelector(".zx").onclick=closeZoom;
    zoom.querySelector(".znav.prev").onclick=function(e){e.stopPropagation();step(-1);};
    zoom.querySelector(".znav.next").onclick=function(e){e.stopPropagation();step(1);};
    zoom.onclick=function(e){ if(e.target===zoom)closeZoom(); };
    document.addEventListener("keydown",function(e){
      if(!zoom||!zoom.classList.contains("on"))return;
      if(e.key==="Escape")closeZoom(); else if(e.key==="ArrowLeft")step(-1); else if(e.key==="ArrowRight")step(1);
    });
  }
  function openZoom(){ if(!photos.length)return; if(!zoom)buildZoom(); zImg.src=photos[pi]; zCnt.textContent=(pi+1)+" / "+photos.length; zoom.querySelector(".znav.prev").style.display=zoom.querySelector(".znav.next").style.display=photos.length>1?"":"none"; zoom.classList.add("on"); document.body.classList.add("noscroll"); }
  function closeZoom(){ if(zoom){zoom.classList.remove("on");document.body.classList.remove("noscroll");} }

  function boot(){
    var list=(window.PROPERTIES&&Array.isArray(window.PROPERTIES))?window.PROPERTIES:[];
    var id=getId();
    var p=id?list.filter(function(x){return x.id===id;})[0]:null;
    if(p)render(p); else notFound();
  }
  var isHans=(document.documentElement.lang||"").toLowerCase().indexOf("hans")>-1 || /-cn\.html$/.test(location.pathname);
  if(isHans){
    var sc=document.createElement("script"); sc.src="opencc-t2cn.js";
    sc.onload=function(){ try{ var api=window.OpenCC; if(api&&api.Converter){ var cc=api.Converter({from:"tw",to:"cn"}); conv=function(s){return cc(s);}; } }catch(e){} boot(); };
    sc.onerror=boot; document.head.appendChild(sc);
  } else { boot(); }
})();
</script>
