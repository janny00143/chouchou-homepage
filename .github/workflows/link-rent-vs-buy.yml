name: Link rent vs buy article
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add article link
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text()
          old='{id:"a2",cat:"live",date:"2026-04-15"'
          new='{id:"a2",cat:"live",url:"rent-vs-buy.html",date:"2026-06-21"'
          if old not in s:
              raise SystemExit('article a2 not found')
          p.write_text(s.replace(old,new,1))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "連結租屋與買房完整文章"
          git push