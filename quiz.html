.hero{text-align:center;padding:34px 0 6px}

.opt.sel .ic{background:var(--rose);color:#fff}
.opt .ck{margin-left:auto;width:22px;height:22px;flex:0 0 auto;border-radius:50%;border:1.8px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.opt.sel .ck{background:var(--rose);border-color:var(--rose)}

.r-body{padding:22px}

.bars .bt{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:9px}

.r-also{margin-top:18px}

.r-also .mini b{font-size:15px}
.r-also .mini p{font-size:13px;color:var(--mut);margin-top:2px}
.reality{background:#fffbeb;border:2px solid #fbbf24;border-radius:14px;padding:18px 19px;margin-top:14px}
.reality b{color:#b45309}
.reality p{font-size:16px;color:#3f3a2f;line-height:1.95;margin:0;font-weight:500}
.reality .cta-line{margin-top:11px;font-size:16px;color:var(--rose-d)}
.reality .re-btn{margin-top:14px;background:#fff;border:1.8px solid #f6adbe;color:#ef5f7e;font-family:inherit;font-weight:700;font-size:14.5px;padding:11px 24px;border-radius:999px;cursor:pointer}
.reality .re-btn:hover{background:#fff1f5}
.strict{background:#fffbeb;border:1.6px solid #fbbf24;border-radius:14px;padding:15px 17px;margin-top:16px}
.strict b{color:#b45309}
.strict p{font-size:14px;color:#44403c;line-height:1.85;margin:0}
.cta{text-align:center;margin-top:22px}
.cta a.line{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;font-weight:700;font-size:17px;padding:15px 38px;border-radius:999px;box-shadow:0 8px 22px rgba(16,185,129,.28)}
.cta a.line:hover{background:var(--green-d)}
.cta .re{display:block;margin-top:14px;background:none;border:none;color:var(--mut);font-family:inherit;font-size:14px;cursor:pointer;width:100%;padding:6px}
.cta .re:hover{color:var(--ink)}
.disc{font-size:12px;color:var(--mut);text-align:center;margin:26px 0 40px;line-height:1.8;max-width:540px;margin-left:auto;margin-right:auto}
@media(max-width:600px){

  .an-row .dim{flex-basis:74px}

}

    <p>先分「自住」還是「投資」，再一步步幫你縮小範圍。<br>透天、公寓、塔樓、注文宅，或收租、民宿、整棟…周周幫你分析。</p>

<script>

/* =========================================================
   邏輯
   ========================================================= */
var state = { i:0, answers:[], structure:null, wantTower:false, wantUsed:false, towerBlocked:false };

function branchOf(){ return (state.answers[0] && state.answers[0][0]===1) ? 'invest' : 'live'; }
function activeQ(){ return [FORK].concat(branchOf()==='invest' ? INVEST_Q : LIVE_Q); }

function start(){
  state = { i:0, answers:[], structure:null, wantTower:false, wantUsed:false, towerBlocked:false };
  document.getElementById('intro').style.display='none';
  document.getElementById('resultHost').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

function render(){
  var qs = activeQ(), Q = qs[state.i], total = qs.length;
  if(!state.answers[state.i]) state.answers[state.i]=[];
  document.getElementById('pfill').style.width = ((state.i)/total*100)+'%';
  document.getElementById('pnum').textContent = '第 '+(state.i+1)+' / '+total+' 題';
  var sel = state.answers[state.i];
  var h = '<div class="card">';
  h += '<div class="q-no">Q'+(state.i+1)+'</div>';
  h += '<div class="q-title">'+Q.q+'</div>';
  h += '<div class="q-hint">'+Q.hint+'</div>';
  h += Q.multi ? '<span class="multi-tag">✔ 可複選</span>' : '<span class="multi-tag single">◉ 單選題</span>';
  h += '<div class="opts">';
  Q.opts.forEach(function(o,idx){
    var on = sel.indexOf(idx)>=0;
    h += '<button class="opt'+(on?' sel':'')+'" onclick="tap('+idx+')"><span class="ic">'+o.ic+'</span><span>'+o.t+'</span>'+(Q.multi?'<span class="ck">'+(on?'✓':'')+'</span>':'')+'</button>';
  });
  h += '</div>';
  h += '<div class="q-actions">';
  h += '<button class="prev" onclick="back()">'+(state.i>0?'← 上一題':'')+'</button>';
  if(Q.multi){
    var last = (state.i===total-1);
    h += '<button class="next" onclick="nextQ()"'+(sel.length?'':' disabled')+'>'+(last?'看結果 →':'下一題 →')+'</button>';
  }
  h += '</div></div>';
  document.getElementById('qhost').innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function tap(idx){
  var qs = activeQ(), Q = qs[state.i];
  if(!state.answers[state.i]) state.answers[state.i]=[];
  var sel = state.answers[state.i];
  if(Q.multi){
    var p = sel.indexOf(idx);
    if(p>=0) sel.splice(p,1); else sel.push(idx);
    render();
  } else {
    state.answers[state.i] = [idx];
    if(state.i===0) state.answers.length = 1;   // 改「方向」時，清掉後面舊答案
    advance();
  }
}
function nextQ(){ if(state.answers[state.i] && state.answers[state.i].length) advance(); }
function advance(){ if(state.i < activeQ().length-1){ state.i++; render(); } else finish(); }
function back(){ if(state.i>0){ state.i--; render(); } }

function finish(){
  var branch = branchOf();
  var keys = (branch==='invest') ? INVEST_KEYS : LIVE_KEYS;
  var qs = activeQ();
  var score = {}; keys.forEach(function(k){ score[k]=0; });
  state.wantTower=false; state.wantUsed=false; state.towerBlocked=false; state.structure=null;
  state.answers.forEach(function(sel,qi){
    if(!sel || qi>=qs.length) return;
    sel.forEach(function(idx){
      var o = qs[qi].opts[idx]; if(!o) return;
      if(o.tower) state.wantTower = true;
      if(o.used) state.wantUsed = true;
      if(o.structure) state.structure = o.structure;
      var add = o.add || {};
      Object.keys(add).forEach(function(k){ if(k in score) score[k]+=add[k]; });
    });
  });

  // 自住：塔樓幾乎都要 1 億以上，預算未達最高級距就改推公寓
  if(branch==='live'){
    var bIdx = state.answers[2] ? state.answers[2][0] : undefined;
    if(bIdx!==4 && score.tower>0){
      score.mansion_new += score.tower; score.tower = 0;
      if(state.wantTower) state.towerBlocked = true;
    }
  }

  var ranked = keys.slice().sort(function(a,b){ return score[b]-score[a]; });
  var top = ranked[0], topScore = score[top]||0;
  var also = ranked.slice(1).filter(function(k){ return score[k]>0 && score[k] >= topScore*0.7; }).slice(0,2);
  var closeCount = ranked.filter(function(k){ return score[k]>0 && score[k] >= topScore*0.85; }).length;
  // 只有自住、且「很有堅持(客製第3項)」或「多房型難分」才建議注文宅
  var strict = (branch==='live') && ((state.answers[4] && state.answers[4].indexOf(2)>=0) || closeCount>=4);
  showResult(branch, top, also, strict, score, ranked);
}

function structLabel(){
  if(state.structure==='rc') return {t:"建議偏 RC（鋼筋混凝土）", why:"你重視耐震與隔音，RC 造隔音好、耐震表現穩定，適合你。"};
  if(state.structure==='wood') return {t:"木造也很適合你", why:"日本木造工法成熟、造價親民、冬暖，預算優先的話很划算。"};
  return {t:"木造 / RC 由周周依情況建議", why:"這部分可以看你的預算、地點跟需求，周周再幫你分析哪種划算。"};
}

function recapHTML(branch){
  var dims = ['購屋方向'].concat(branch==='invest' ? DIMS_INVEST : DIMS_LIVE);
  var qs = activeQ(), rows = '';
  state.answers.forEach(function(sel,qi){
    if(!sel || !sel.length || qi>=qs.length) return;
    var txt = sel.map(function(idx){ return qs[qi].opts[idx].t; }).join('、');
    rows += '<div class="an-row"><span class="dim">'+(dims[qi]||'')+'</span><span class="val">'+txt+'</span></div>';
  });
  return rows;
}

function barsHTML(score, ranked){
  var topScore = score[ranked[0]] || 1;
  var list = ranked.filter(function(k){ return score[k]>0; }).slice(0,5);
  var h = '<div class="bars"><div class="bt">📊 各方向契合度</div>';
  list.forEach(function(k,i){
    var pct = Math.round(score[k]/topScore*100);
    h += '<div class="bar-row"><span class="bar-name">'+RESULTS[k].short+'</span><span class="bar-track"><span class="bar-fill'+(i===0?'':' dim')+'" style="width:'+pct+'%"></span></span><span class="bar-pct">'+pct+'%</span></div>';
  });
  h += '</div>';
  return h;
}

function whyHTML(branch, top){
  var qs = activeQ(), a = state.answers;
  if(branch==='invest'){
    var way = (a[1]||[]).map(function(i){ return qs[1].opts[i].t.split(' —')[0]; }).join('、');
    var bud = (a[3]&&a[3].length) ? qs[3].opts[a[3][0]].t : '';
    var s = '你選擇<b>投資</b>方向';
    if(way) s += '、想要<b>'+way+'</b>';
    if(bud) s += '、預算<b>'+bud+'</b>';
    s += '。'+RESULTS[top].fit+' 綜合起來，最適合你的是 <b>'+RESULTS[top].name+'</b>。';
    return s;
  }
  var home = (a[1]||[]).map(function(i){ return qs[1].opts[i].t.split(' —')[0]; }).join('、');
  var bud2 = (a[2]&&a[2].length) ? qs[2].opts[a[2][0]].t : '';
  var place = (a[5]||[]).map(function(i){ return qs[5].opts[i].t; }).join('、');
  var s2 = '你選擇<b>自住</b>方向';
  if(home) s2 += '、偏好<b>'+home+'</b>';
  if(bud2) s2 += '、預算<b>'+bud2+'</b>';
  if(place) s2 += '、地點<b>'+place+'</b>';
  s2 += '。'+RESULTS[top].fit+' 綜合起來，最貼近你的是 <b>'+RESULTS[top].name+'</b>。';
  return s2;
}

function ctaBox(head, body){
  return '<div class="reality"><p><b>'+head+'</b>'+body+'</p><p class="cta-line"><b>想知道你的預算實際適合什麼？直接私訊周周，我幫你評估！</b></p></div>';
}

function budgetNote(branch, top){
  if(branch==='invest'){
    var ib = state.answers[3] ? state.answers[3][0] : undefined;
    if(ib===undefined) return '';
    if(top==='invest_hotel' && ib<3)
      return ctaBox('🏨 關於民宿/旅館預算：','民宿／旅館基本上要買<b>一整棟</b>，物件<b>大約 7,000 萬日圓起跳</b>，你目前設定的預算可能還不太夠，且經營風險比一般租賃高。可以先從住宅租賃或商用起步。');
    if(top==='invest_ittou' && ib<4)
      return ctaBox('🏗️ 關於整棟預算：','整棟收購通常<b>破億日圓</b>起跳，你目前設定的預算可能還不太夠。可以先從區分（一間）或商用物件起步，慢慢往整棟走。');
    return '';
  }
  var bi = state.answers[2] ? state.answers[2][0] : undefined;
  if(bi===undefined) return '';
  if(top==='chumon'){
    if(bi>2) return '';
    return ctaBox('🏗️ 關於注文宅預算：','注文宅是「買地＋蓋房」，土地加建築成本，總預算通常偏高。用你目前的預算會比較吃緊，建議先跟周周聊聊地點與預算怎麼配置。');
  }
  var wantsNew = ['shinchiku_kodate','mansion_new','tower'].indexOf(top)>=0
      || (state.answers[3] && (state.answers[3].indexOf(0)>=0 || state.answers[3].indexOf(1)>=0))
      || (state.answers[4] && state.answers[4].indexOf(0)>=0);
  var msg='', retake=false;
  if(bi===0){ msg='老實說，用這個預算在東京都內幾乎碰不到新屋——多半是屋齡較高的中古小宅，或要往比較遠的郊區、甚至東京都以外才有機會。如果你想要新一點、地點又方便的房子，建議把預算或條件再放寬一點喔。'; retake=true; }
  else if(bi===1){ msg='跟你說個實話，用這個預算在東京主要販售區域通常還是以中古為主，全新的選擇很少。想要又新、地點又好，多半得再往上抓一點預算，或先從中古入手。'; }
  else if(bi===2 && wantsNew){ msg='偷偷跟你說，想在這些精華地段、用這個預算買到「全新」，其實不太容易哦😅（你的標準有一點點高～）。同樣的預算換成中古、或稍微外圍一點，選擇會多很多。'; }
  else return '';
  var h = '<div class="reality"><p><b>🏷️ 關於預算：</b>'+msg+'</p>';
  h += '<p class="cta-line"><b>想知道你的預算實際能買到什麼樣的房子？直接私訊周周，我幫你抓真實行情！</b></p>';
  if(retake) h += '<button class="re-btn" onclick="start()">↺ 放寬條件，再測一次</button>';
  h += '</div>';
  return h;
}

function showResult(branch, top, also, strict, score, ranked){
  var R = RESULTS[top];
  var st = structLabel();
  var host = document.getElementById('resultHost');
  document.getElementById('quiz').style.display='none';
  document.getElementById('pfill').style.width='100%';

  var isHouse = (top==='shinchiku_kodate'||top==='chuko_kodate'||top==='chumon');
  var isMansion = (top==='mansion_new'||top==='mansion_used'||top==='tower');

  var h = '<div class="result">';
  h += '<div class="r-lead"><span class="k">✨ 你的測驗結果</span></div>';
  h += '<div class="r-card">';
  h += '<img class="cov" src="'+R.img+'" alt="'+R.name+'">';
  h += '<div class="r-body">';
  h += '<h2>你比較適合：'+R.name+'</h2>';
  h += '<div class="tags">';
  R.tags.forEach(function(t){ h+='<span class="tag">'+t+'</span>'; });
  if(isHouse) h += '<span class="tag st">'+st.t+'</span>';
  if(isMansion) h += '<span class="tag st">RC／SRC 造</span>';
  if(top==='tower' && state.wantUsed) h += '<span class="tag st">中古塔樓 CP 值更高</span>';
  h += '</div>';
  h += '<p class="desc">'+R.desc+'</p>';
  if(isHouse) h += '<p class="desc" style="margin-top:10px;color:#2563eb">🧱 '+st.why+'</p>';
  if(isMansion && state.structure==='wood') h += '<p class="desc" style="margin-top:10px;color:#2563eb">🧱 你偏好木造的溫暖感，不過公寓大樓與塔樓幾乎都是 RC／SRC 鋼筋結構、沒有木造喔；想要木造的話，會比較適合看透天。</p>';
  h += '</div></div>';

  if(branch==='live' && state.towerBlocked){
    h += '<div class="reality"><p><b>🏙️ 關於塔樓：</b>你嚮往塔樓（高樓層公寓），不過塔樓在東京多半要 <b>1 億日圓以上</b>的預算才比較買得到。以你目前設定的預算，會建議先從<b>全新／大型公寓大樓</b>入手，一樣有管理員、機能好、又保值。</p><p class="cta-line"><b>如果真的很想要塔樓，也可以私訊周周，我幫你看看有沒有適合的中古塔樓或方案！</b></p></div>';
  }

  h += budgetNote(branch, top);

  /* ---- 分析 ---- */
  h += '<div class="an">';
  h += '<h3>🔍 周周的分析</h3>';
  h += '<div class="sub">根據你的選擇，幫你整理出方向</div>';
  h += barsHTML(score, ranked);
  h += '<div class="an-why">'+whyHTML(branch, top)+'</div>';
  h += '<div class="an-recap">'+recapHTML(branch)+'</div>';
  h += '</div>';

  h += '<div class="r-note"><p><b>💡 周周的提醒：</b>'+R.note+'</p></div>';

  if(also.length){
    h += '<div class="r-also"><div class="h">你其實也蠻適合這些方向 👇</div>';
    also.forEach(function(k){
      var A = RESULTS[k];
      h += '<div class="mini"><img src="'+A.img+'" alt="'+A.name+'"><div><b>'+A.name+'</b><p>'+A.tags.join('・')+'</p></div></div>';
    });
    h += '</div>';
  }

  if(strict && top!=='chumon'){
    h += '<div class="strict"><p><b>🎨 想得很細、每種都有堅持？</b>你的答案分布蠻分散、對細節也很有想法——這種情況，市售現成的房子可能都會差你一點。真的很講究的話，可以考慮<b>注文宅（買地自己設計）</b>，蓋一間完全照你想法的房子；不過要提醒你，注文宅比較花心力、預算通常也會高一些喔。要不要走這條路，周周可以幫你評估預算再決定。</p></div>';
  }

  h += '<div class="cta">';
  h += '<a class="line" href="https://lin.ee/RscRWCp" target="_blank" rel="noopener">💬 加 LINE 問周周這個方向</a>';
  h += '<button class="re" onclick="start()">↺ 重新測一次</button>';
  h += '</div>';

  h += '<p class="disc">＊本測驗僅為協助釐清方向的趣味參考，非投資或購屋建議。實際適合的房型、貸款成數、投報率與稅務等，仍需依個案評估，並由宅建士／司法書士／稅理士確認為準。</p>';
  h += '</div>';

  host.innerHTML = h;
  host.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
