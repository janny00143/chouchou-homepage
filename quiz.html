<style>
:root{--rose:#f43f5e;--rose-d:#e11d48;--rose-l:#fff1f2;--green:#10b981;--green-d:#059669;--ink:#292524;--mut:#78716c;--bg:#fafaf9;--line:#e7e5e4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;font-size:16px}
a{color:inherit;text-decoration:none}img{max-width:100%;display:block}
.wrap{max-width:720px;margin:0 auto;padding:0 16px}
header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:1100px;margin:0 auto;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px}
.logo-emblem{height:40px;width:auto;display:block;flex-shrink:0}
.hd a.back{font-size:13.5px;color:var(--mut);padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff}
.hd a.back:hover{background:#f5f5f4}

.pbar{height:6px;background:#f0eeec;border-radius:999px;overflow:hidden;margin:22px 0 6px}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--rose),#fb7185);border-radius:999px;transition:width .35s ease}
.pnum{font-size:13px;color:var(--mut);font-weight:600;text-align:right}

.hero{text-align:center;padding:34px 0 6px}
.hero .kick{display:inline-block;background:var(--rose-l);color:var(--rose-d);font-weight:700;font-size:13px;padding:5px 14px;border-radius:999px;margin-bottom:14px}
.hero h1{font-size:30px;font-weight:900;letter-spacing:.5px;line-height:1.3}
.hero h1 span{color:var(--rose)}
.hero p{color:var(--mut);margin:14px auto 0;max-width:470px}
.hero .meta{margin-top:14px;font-size:13px;color:var(--mut)}
.startbtn{display:inline-flex;align-items:center;gap:8px;background:var(--rose);color:#fff;font-weight:700;font-size:17px;padding:15px 40px;border-radius:999px;border:none;cursor:pointer;margin-top:24px;box-shadow:0 8px 22px rgba(244,63,94,.28);transition:.15s}
.startbtn:hover{background:var(--rose-d);transform:translateY(-1px)}

.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px 22px;box-shadow:0 6px 22px rgba(0,0,0,.05);margin-top:16px}
.q-no{font-size:13px;font-weight:700;color:var(--rose);letter-spacing:1px}
.q-title{font-size:21px;font-weight:700;margin:8px 0 4px;line-height:1.4}
.q-hint{font-size:13.5px;color:var(--mut);margin-bottom:6px}
.multi-tag{font-size:12.5px;color:var(--rose-d);background:var(--rose-l);font-weight:600;padding:3px 10px;border-radius:999px;display:inline-block;margin:4px 0 14px}
.multi-tag.single{color:#2563eb;background:#eff6ff}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:1.6px solid var(--line);border-radius:14px;padding:14px 16px;font-family:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;transition:.13s;line-height:1.45}
.opt:hover{border-color:#fbb6c4;background:var(--rose-l)}
.opt .ic{width:38px;height:38px;flex:0 0 auto;border-radius:11px;background:var(--rose-l);display:flex;align-items:center;justify-content:center;font-size:20px}
.opt.sel{border-color:var(--rose);background:var(--rose-l)}
.opt.sel .ic{background:var(--rose);color:#fff}
.opt .ck{margin-left:auto;width:22px;height:22px;flex:0 0 auto;border-radius:50%;border:1.8px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.opt.sel .ck{background:var(--rose);border-color:var(--rose)}
.q-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
.q-actions .prev{background:none;border:none;color:var(--mut);font-family:inherit;font-size:14px;cursor:pointer;padding:8px 6px}
.q-actions .prev:hover{color:var(--ink)}
.q-actions .next{background:var(--rose);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:15px;padding:11px 30px;border-radius:999px;cursor:pointer}
.q-actions .next:disabled{opacity:.35;cursor:not-allowed}

.result{margin-top:16px}
.r-lead{text-align:center;margin-bottom:6px}
.r-lead .k{display:inline-block;background:var(--rose-l);color:var(--rose-d);font-weight:700;font-size:13px;padding:5px 14px;border-radius:999px}
.r-card{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.06);margin-top:14px}
.r-card .cov{width:100%;height:210px;object-fit:cover;background:#eee}
.r-body{padding:22px}
.r-body h2{font-size:24px;font-weight:900;line-height:1.35}
.r-body .tags{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
.r-body .tag{font-size:12.5px;font-weight:600;color:var(--rose-d);background:var(--rose-l);padding:4px 11px;border-radius:999px}
.r-body .tag.st{color:#2563eb;background:#eff6ff}
.r-body p.desc{color:#44403c;font-size:15px;margin-top:6px}
.p-lead{font-size:12.5px;font-weight:800;color:var(--rose-d);letter-spacing:2px}
.p-type{font-size:27px;font-weight:900;margin:3px 0 2px;line-height:1.25}
.p-desc{font-size:15px;color:#44403c;line-height:1.9;margin-top:10px}
.p-div{height:1px;background:var(--line);margin:18px 0}
.r-match{font-size:12.5px;font-weight:800;color:var(--mut);letter-spacing:1px}
.r-mname{font-size:20px;font-weight:900;margin:3px 0 2px}
.pcard-full{width:100%;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.12);margin-top:14px;display:block}
.pcard-share{text-align:center;font-size:13px;color:var(--mut);margin-top:10px}
.pcard-note{font-size:14px;color:#1d4ed8;margin-top:11px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:11px 14px;line-height:1.7}

/* ---- 分析 ---- */
.an{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:14px;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.an h3{font-size:17px;font-weight:900;display:flex;align-items:center;gap:7px}
.an .sub{font-size:13px;color:var(--mut);margin:2px 0 14px}
.an-recap{border-top:1px dashed var(--line);padding-top:14px;margin-top:4px}
.an-row{display:flex;gap:10px;padding:7px 0;font-size:14px;align-items:baseline}
.an-row .dim{flex:0 0 82px;color:var(--mut);font-weight:600}
.an-row .val{flex:1;color:var(--ink);font-weight:500}
.an-why{background:var(--rose-l);border-radius:12px;padding:13px 15px;margin-top:14px;font-size:14px;line-height:1.85;color:#44403c}
.an-why b{color:var(--rose-d)}
.bars{margin-top:16px}
.bars .bt{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:9px}
.bar-row{display:flex;align-items:center;gap:10px;margin:7px 0}
.bar-name{flex:0 0 96px;font-size:13px;font-weight:600}
.bar-track{flex:1;height:11px;background:#f0eeec;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--rose),#fb7185);border-radius:999px;transition:width .6s ease}
.bar-fill.dim{background:#d6d3d1}
.bar-pct{flex:0 0 42px;text-align:right;font-size:12.5px;font-weight:700;color:var(--rose-d)}

/* ---- 專屬類型詳細說明 ---- */
.tdetail{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:14px;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.tdetail h3{font-size:17px;font-weight:900;display:flex;align-items:center;gap:7px;line-height:1.35}
.tdetail .tsub{font-size:13px;color:var(--mut);margin:3px 0 6px}
.tdetail .def{font-size:14.5px;color:#44403c;background:#faf9f7;border-radius:10px;padding:12px 14px;margin:12px 0 2px}
.blk{margin-top:14px}
.blk .bh{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:800;margin-bottom:7px}
.blk ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.blk li{position:relative;padding-left:19px;font-size:14px;color:#44403c;line-height:1.75}
.blk li::before{position:absolute;left:2px;top:1px;font-size:12px}
.blk.feat .bh{color:#2563eb}.blk.feat li::before{content:"◆";color:#93c5fd}
.blk.pro .bh{color:var(--green-d)}.blk.pro li::before{content:"✔";color:#6ee7b7}
.blk.warn .bh{color:#b45309}.blk.warn li::before{content:"!";color:#fbbf24;font-weight:900}
.blk.fit .bh{color:var(--rose-d)}.blk.fit li::before{content:"♥";color:#fca5b8}
.blk.fit{background:var(--rose-l);border-radius:10px;padding:12px 14px}
.morebtn{display:block;text-align:center;margin-top:16px;background:#fff;border:1.6px solid #f6adbe;color:#ef5f7e;font-family:inherit;font-weight:700;font-size:14.5px;padding:12px;border-radius:12px}
.morebtn:hover{background:#fff1f5}

.r-note{background:linear-gradient(135deg,#fff1f2,#ffe4e6);border:1.6px solid #fb7185;border-radius:14px;padding:15px 17px;margin-top:16px}
.r-note b{color:var(--rose-d)}
.r-note p{font-size:14px;color:#44403c;line-height:1.85;margin:0}
.r-also{margin-top:18px}
.r-also .h{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px}
.r-also .mini{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px}
.r-also .mini img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex:0 0 auto}
.r-also .mini b{font-size:15px}
.r-also .mini p{font-size:13px;color:var(--mut);margin-top:2px}
.reality{background:#fffbeb;border:2px solid #fbbf24;border-radius:14px;padding:18px 19px;margin-top:14px}
.reality b{color:#b45309}
.reality p{font-size:16px;color:#3f3a2f;line-height:1.95;margin:0;font-weight:500}
.reality .cta-line{margin-top:11px;font-size:16px;color:var(--rose-d)}
.reality .re-btn{margin-top:14px;background:#fff;border:1.8px solid #f6adbe;color:#ef5f7e;font-family:inherit;font-weight:700;font-size:14.5px;padding:11px 24px;border-radius:999px;cursor:pointer}
.reality .re-btn:hover{background:#fff1f5}
.strict{background:#fffbeb;border:1.6px solid #fbbf24;border-radius:14px;padding:15px 17px;margin-top:16px}
.strict b{color:#b45309}
.strict p{font-size:14px;color:#44403c;line-height:1.85;margin:0}
.cta{text-align:center;margin-top:22px}
.cta a.line{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;font-weight:700;font-size:17px;padding:15px 38px;border-radius:999px;box-shadow:0 8px 22px rgba(16,185,129,.28)}
.cta a.line:hover{background:var(--green-d)}
.cta .re{display:block;margin-top:14px;background:none;border:none;color:var(--mut);font-family:inherit;font-size:14px;cursor:pointer;width:100%;padding:6px}
.cta .re:hover{color:var(--ink)}
.disc{font-size:12px;color:var(--mut);text-align:center;margin:26px 0 40px;line-height:1.8;max-width:540px;margin-left:auto;margin-right:auto}
@media(max-width:600px){
  .hero h1{font-size:25px}
  .q-title{font-size:19px}
  .opt{font-size:14.5px;padding:12px 13px;gap:11px}
  .opt .ic{width:34px;height:34px;font-size:18px}
  .r-body h2{font-size:21px}
  .an-row .dim{flex-basis:74px}
  .bar-name{flex-basis:80px}
}
</style>

<header>
  <div class="hd">
    <a class="logo" href="index.html"><img class="logo-emblem" src="logo-mark.png" alt="周周・日本房仲"><span>周周・日本房仲</span></a>

<div class="wrap">
  <section id="intro" class="hero">
    <span class="kick">🔮 買房人格測驗</span>
    <h1>測出你的<br><span>買房人格</span></h1>
    <p>不用先懂房型，照你的生活與直覺回答，<br>看看你是 10 種買房人格的哪一種，周周再幫你分析最適合的物件。</p>
    <div class="meta">先選自住或投資，各有專屬題目 · 部分可複選 · 結果附人格分析</div>
    <button class="startbtn" onclick="start()">開始測驗 →</button>
  </section>

  <div id="quiz" style="display:none">
    <div class="pbar"><i id="pfill" style="width:0"></i></div>
    <div class="pnum" id="pnum"></div>
    <div id="qhost"></div>
  </div>

  <div id="resultHost" style="display:none"></div>
</div>

<script>
/* =========================================================
   結果類型（RESULTS）：自住 6 種 + 投資 4 種
   選項一律「不直接講出結果」，靠生活/性格題去推導
   ========================================================= */
var RESULTS = {
  /* ---- 自住 ---- */
  shinchiku_kodate: {
    name:"新築一戶建（全新透天）", short:"新築透天", img:"quiz-shinchiku.jpg",
    tags:["獨門獨戶","有土地","可停車/養寵物"],
    fit:"你重視自己的空間與土地，又想要免整修、直接入住的新屋。",
    desc:"你重視自己的空間、想要一個完整屬於自己的家。全新透天格局方正、屋況新、幾乎免整修就能入住，還能保有土地。近郊會比都心好入手。",
    note:"周周會幫你看基地形狀、日照、道路條件跟建商品質，這幾點會直接影響住起來舒不舒服、以後好不好轉手。"
  },
  chuko_kodate: {
    name:"中古一戶建（中古透天）", short:"中古透天", img:"pexels-pixabay-280471.jpg",
    tags:["CP 值高","有土地","可翻修"],
    fit:"你想要透天的自由，又很在意 CP 值，願意用整修換到更好的地點或空間。",
    desc:"你想要透天的自由，又在意 CP 值。中古透天單價親民、同預算能換更大空間或更好地點，屋況可以靠整修慢慢養。",
    note:"中古屋最怕買到屋況地雷。周周會幫你把關屋齡、耐震基準、白蟻/漏水這些看不到的重點，必要時安排驗屋，別只看照片就下手。"
  },
  chumon: {
    name:"買土地自己設計（注文宅／訂製宅）", short:"注文宅", img:"pexels-pixabay-271655.jpg",
    tags:["完全客製","從土地開始","自由度最高"],
    fit:"你對格局、建材、風格很有主見，市售現成的總覺得差一點。",
    desc:"你對格局、建材、風格有很多堅持，市面上現成的房子總覺得差一點。那就直接買地、找建築師蓋一間完全照你想法的房子。",
    note:"注文宅自由度最高，但也最花心力、預算通常較高、工期較長。周周會協助你找地、對接建商/建築師、算總預算，讓你清楚知道要投入多少再決定。"
  },
  mansion_new: {
    name:"全新／大型公寓大樓", short:"全新公寓", img:"prop-minamiazabu205-1.jpg",
    tags:["生活機能佳","有管理員","保值好轉手"],
    fit:"你想要方便、有管理、好轉手的都會生活，偏好新一點、省心的屋況。",
    desc:"你想要方便、輕鬆、有管理的生活。都心的全新或大型公寓大樓機能好、有管理員代收包裹跟維護公設，地點好的很保值。",
    note:"公寓要看的是管理狀況跟管理費/修繕基金合不合理——這比裝潢重要多了。周周會幫你確認社區體質，避免買到管理鬆散、將來難轉手的物件。"
  },
  mansion_used: {
    name:"中古公寓（小資首選）", short:"中古公寓", img:"物件-客廳.jpg",
    tags:["入門門檻低","地點好挑","可自住可出租"],
    fit:"你想用相對輕的預算在都心進場，重視地點更勝於全新。",
    desc:"想用相對輕的預算在都心進場，中古公寓是很實際的選擇。同樣地段，中古比全新便宜不少，還能挑到車站近的好位置，自住、之後出租都靈活。",
    note:"中古公寓的關鍵在屋齡、耐震基準跟社區管理。周周會幫你篩掉那些管理費偏高、修繕金不足的物件，也能順便估貸款成數（依個案、依銀行審查為準）。"
  },
  tower: {
    name:"塔樓（高樓層公寓）", short:"塔樓", img:"晴空塔.jpg",
    tags:["高樓景觀","氣派門廳","公設齊全"],
    fit:"你嚮往高樓景觀、氣派門廳跟齊全公設的都會生活。",
    desc:"你嚮往高樓層的景觀、氣派的大廳與豐富公設（健身房、交誼廳、禮賓等）。塔樓多在都心與灣岸區，能見度高、生活便利。想省一點也有<b>中古塔樓</b>可選，同地段通常比全新划算。",
    note:"塔樓的管理費、修繕基金通常較高，高樓層與棟距、風壓、電梯尖峰也要一起看；轉售時樓層與座向差很多。周周會幫你比全新與中古塔樓的實際持有成本，挑到真正划算的那一戶。"
  },
  /* ---- 投資 ---- */
  invest_rent: {
    name:"住宅租賃（區分・一間收租）", short:"住宅租賃", img:"prop-togoshi701-1.jpg",
    tags:["穩定","門檻低","報酬一般"],
    fit:"你想要穩定、門檻低、好上手的收租方式。",
    desc:"把物件租給一般人或家庭，是最好上手的投資：可以從一間區分（單間）開始，租客需求廣、<b>相對穩定</b>，但<b>回報率也比較一般</b>。適合想穩穩收租、慢慢累積的人。",
    note:"網站標示的都是表面投報率，沒扣管理、修繕、稅金跟空租風險。周周會幫你算實質投報率，把真實的數字攤給你看，不會只看漂亮的表面數字。"
  },
  invest_biz: {
    name:"店鋪・辦公室（商用租賃）", short:"店鋪辦公室", img:"東京鐵塔夜.jpg",
    tags:["長租穩定","報酬中上","資產配置"],
    fit:"你想要比住宅租賃報酬好一些、又相對穩定的商用收租。",
    desc:"把物件租給店鋪或辦公室。商用租約通常較長、<b>相對穩定</b>，收益一般也比住宅租賃好一些；但空租期、承租戶產業與商圈變化要一起評估。",

function branchOf(){ return (state.answers[0] && state.answers[0][0]===1) ? 'invest' : 'live'; }
function activeQ(){ return [FORK].concat(branchOf()==='invest' ? INVEST_Q : LIVE_Q); }
function ansOf(role){ var qs=activeQ(); for(var i=0;i<qs.length;i++){ if(qs[i].role===role) return state.answers[i]||[]; } return []; }
function budgetIdxOf(){ var a=ansOf('budget'); return a.length?a[0]:undefined; }
function flagPicked(flag){ var qs=activeQ(); for(var i=0;i<qs.length;i++){ var a=state.answers[i]; if(!a)continue; for(var j=0;j<a.length;j++){ var o=qs[i].opts[a[j]]; if(o&&o[flag]) return true; } } return false; }
function txtOf(role){ var qs=activeQ(); for(var i=0;i<qs.length;i++){ if(qs[i].role===role){ var a=state.answers[i]||[]; return a.map(function(x){ return qs[i].opts[x].t.split(' —')[0]; }).join('、'); } } return ''; }

function start(){
  state = { i:0, answers:[], structure:null, wantTower:false, wantUsed:false, towerBlocked:false };
  document.getElementById('intro').style.display='none';
  document.getElementById('resultHost').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

function render(){
  var qs = activeQ(), Q = qs[state.i], total = qs.length;
  if(!state.answers[state.i]) state.answers[state.i]=[];
  document.getElementById('pfill').style.width = ((state.i)/total*100)+'%';
  document.getElementById('pnum').textContent = '第 '+(state.i+1)+' / '+total+' 題';
  var sel = state.answers[state.i];
  var h = '<div class="card">';
  h += '<div class="q-no">Q'+(state.i+1)+'</div>';
  h += '<div class="q-title">'+Q.q+'</div>';
  h += '<div class="q-hint">'+Q.hint+'</div>';
  h += Q.multi ? '<span class="multi-tag">✔ 可複選</span>' : '<span class="multi-tag single">◉ 單選題</span>';
  h += '<div class="opts">';
  Q.opts.forEach(function(o,idx){
    var on = sel.indexOf(idx)>=0;
    h += '<button class="opt'+(on?' sel':'')+'" onclick="tap('+idx+')"><span class="ic">'+o.ic+'</span><span>'+o.t+'</span>'+(Q.multi?'<span class="ck">'+(on?'✓':'')+'</span>':'')+'</button>';
  });
  h += '</div>';
  h += '<div class="q-actions">';
  h += '<button class="prev" onclick="back()">'+(state.i>0?'← 上一題':'')+'</button>';
  if(Q.multi){
    var last = (state.i===total-1);
    h += '<button class="next" onclick="nextQ()"'+(sel.length?'':' disabled')+'>'+(last?'看結果 →':'下一題 →')+'</button>';
  }
  h += '</div></div>';
  document.getElementById('qhost').innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function tap(idx){
  var qs = activeQ(), Q = qs[state.i];
  if(!state.answers[state.i]) state.answers[state.i]=[];
  var sel = state.answers[state.i];
  if(Q.multi){
    var p = sel.indexOf(idx);
    if(p>=0) sel.splice(p,1); else sel.push(idx);
    render();
  } else {
    state.answers[state.i] = [idx];
    if(state.i===0) state.answers.length = 1;   // 改「方向」時，清掉後面舊答案
    advance();
  }
}
function nextQ(){ if(state.answers[state.i] && state.answers[state.i].length) advance(); }
function advance(){ if(state.i < activeQ().length-1){ state.i++; render(); } else finish(); }
function back(){ if(state.i>0){ state.i--; render(); } }

function finish(){
  var branch = branchOf();
  var keys = (branch==='invest') ? INVEST_KEYS : LIVE_KEYS;
  var qs = activeQ();
  var score = {}; keys.forEach(function(k){ score[k]=0; });
  state.wantTower=false; state.wantUsed=false; state.towerBlocked=false; state.structure=null;
  state.answers.forEach(function(sel,qi){
    if(!sel || qi>=qs.length) return;
    sel.forEach(function(idx){
      var o = qs[qi].opts[idx]; if(!o) return;
      if(o.tower) state.wantTower = true;
      if(o.used) state.wantUsed = true;
      var add = o.add || {};
      Object.keys(add).forEach(function(k){ if(k in score) score[k]+=add[k]; });
    });
  });

  if(branch==='live'){
    var bIdx = budgetIdxOf();
    if((bIdx===undefined || bIdx<4) && score.tower>0){  // 塔樓需 1 億以上（第 5 檔起）
      score.mansion_new += score.tower; score.tower = 0;
      if(state.wantTower) state.towerBlocked = true;
    }
  }

  var ranked = keys.slice().sort(function(a,b){ return score[b]-score[a]; });
  var top = ranked[0], topScore = score[top]||0;
  var also = ranked.slice(1).filter(function(k){ return score[k]>0 && score[k] >= topScore*0.7; }).slice(0,2);
  var closeCount = ranked.filter(function(k){ return score[k]>0 && score[k] >= topScore*0.85; }).length;
  var strict = (branch==='live') && (flagPicked('picky') || closeCount>=4);

  // 推導木造 / RC（只對自住的透天類；公寓塔樓固定 RC，注文宅自由）
  if(branch==='live'){
    if(top==='chumon') state.structure = 'ask';
    else if(top==='shinchiku_kodate' || top==='chuko_kodate') state.structure = flagPicked('soundproof') ? 'rc' : 'wood';
  }
  showResult(branch, top, also, strict, score, ranked);
}

  }
  var wantsNew = ['shinchiku_kodate','mansion_new','tower'].indexOf(top)>=0 || flagPicked('newish');
  var msg='', retake=false;
  if(bi===0){ msg='老實說，用這個預算在東京都內幾乎碰不到新屋——多半是屋齡較高的中古小宅，或要往比較遠的郊區、甚至東京都以外才有機會。如果你想要新一點、地點又方便的房子，建議把預算或條件再放寬一點喔。'; retake=true; }
  else if(bi===1){ msg='跟你說個實話，用這個預算在東京主要販售區域通常還是以中古為主，全新的選擇很少。想要又新、地點又好，多半得再往上抓一點預算，或先從中古入手。'; }
  else if(bi===2 && wantsNew){ msg='偷偷跟你說，想在這些精華地段、用這個預算買到「全新」，其實不太容易哦😅（你的標準有一點點高～）。同樣的預算換成中古、或稍微外圍一點，選擇會多很多。'; }
  else return '';
  var h = '<div class="reality"><p><b>🏷️ 關於預算：</b>'+msg+'</p>';
  h += '<p class="cta-line"><b>想知道你的預算實際能買到什麼樣的房子？直接私訊周周，我幫你抓真實行情！</b></p>';
  if(retake) h += '<button class="re-btn" onclick="start()">↺ 放寬條件，再測一次</button>';
  h += '</div>';
  return h;
}

function showResult(branch, top, also, strict, score, ranked){
  var R = RESULTS[top];
  var st = structLabel();
  var host = document.getElementById('resultHost');
  document.getElementById('quiz').style.display='none';
  document.getElementById('pfill').style.width='100%';

  var isHouse = (top==='shinchiku_kodate'||top==='chuko_kodate'||top==='chumon');
  var isMansion = (top==='mansion_new'||top==='mansion_used'||top==='tower');

  var P = PERSONA[top] || {emoji:"🏠",type:R.name,keys:R.tags,desc:R.fit};

  var h = '<div class="result">';
  h += '<div class="r-lead"><span class="k">✨ 測驗結果揭曉</span></div>';
  h += '<img class="pcard-full" src="'+(PERSONA_IMG[top]||R.img)+'" alt="'+P.type+'・買房人格卡">';
  h += '<p class="pcard-share">長按或截圖，存下你的買房人格卡分享給朋友 ✨</p>';
  if(isHouse) h += '<p class="pcard-note">🧱 '+st.why+'</p>';
  if(top==='tower' && state.wantUsed) h += '<p class="pcard-note">✨ 你偏好中古 → 同地段的<b>中古塔樓</b>通常比全新划算，周周可以幫你比。</p>';

  if(branch==='live' && state.towerBlocked){
    h += '<div class="reality"><p><b>🏙️ 關於塔樓：</b>你嚮往高樓層的塔樓生活，不過塔樓在東京多半要 <b>1 億日圓以上</b>的預算才比較買得到。以你目前設定的預算，會建議先從<b>全新／大型公寓大樓</b>入手，一樣有管理員、機能好、又保值。</p><p class="cta-line"><b>如果真的很想要塔樓，也可以私訊周周，我幫你看看有沒有適合的中古塔樓或方案！</b></p></div>';
  }

  h += budgetNote(branch, top);

  /* ---- 專屬類型詳細說明（測出來直接跳出） ---- */
  h += typeDetailHTML(top);

  /* ---- 分析 ---- */
  h += '<div class="an">';
  h += '<h3>🔍 周周的分析</h3>';
  h += '<div class="sub">根據你的選擇，幫你推導出方向</div>';
  h += barsHTML(score, ranked);
  h += '<div class="an-why">'+whyHTML(branch, top)+'</div>';
  h += '<div class="an-recap">'+recapHTML(branch)+'</div>';
  h += '</div>';

  h += '<div class="r-note"><p><b>💡 周周的提醒：</b>'+R.note+'</p></div>';

  if(also.length){
    h += '<div class="r-also"><div class="h">你其實也蠻適合這些方向 👇</div>';
    also.forEach(function(k){
      var A = RESULTS[k];
      h += '<div class="mini"><img src="'+A.img+'" alt="'+A.name+'"><div><b>'+A.name+'</b><p>'+A.tags.join('・')+'</p></div></div>';
    });
    h += '</div>';
  }

  if(strict && top!=='chumon'){
    h += '<div class="strict"><p><b>🎨 想得很細、每種都有堅持？</b>你的答案分布蠻分散、對細節也很有想法——這種情況，市售現成的房子可能都會差你一點。真的很講究的話，可以考慮<b>注文宅（買地自己設計）</b>，蓋一間完全照你想法的房子；不過要提醒你，注文宅比較花心力、預算通常也會高一些喔。要不要走這條路，周周可以幫你評估預算再決定。</p></div>';
  }

  h += '<div class="cta">';
  h += '<a class="line" href="https://lin.ee/RscRWCp" target="_blank" rel="noopener">💬 加 LINE 問周周這個方向</a>';
  h += '<button class="re" onclick="start()">↺ 重新測一次</button>';
  h += '</div>';

  h += '<p class="disc">＊本測驗僅為協助釐清方向的趣味參考，非投資或購屋建議。實際適合的房型、貸款成數、投報率與稅務等，仍需依個案評估，並由宅建士／司法書士／稅理士確認為準。</p>';
  h += '</div>';

  host.innerHTML = h;
  host.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
