      {ic:"🛎️", t:"有管理員、公設維護輕鬆", add:{mansion_new:3, mansion_used:2}},
      {ic:"🌆", t:"高樓景觀、氣派門廳的塔樓", add:{tower:4}, tower:true},
      {ic:"🍃", t:"安靜住宅區、近郊換更大空間", add:{shinchiku_kodate:2, chuko_kodate:2, chumon:2}},
      {ic:"🏙️", t:"都心小宅，單身或兩人剛剛好", add:{mansion_used:3, tower:1}}
    ]
  },
  {
    q:"你的購屋預算大概落在？",
    hint:"抓總價的大概區間就好（由低到高）。",
    multi:false,
    opts:[
      {ic:"🪙", t:"2,000 萬日圓以下", add:{mansion_used:2, invest_rent:2, chuko_kodate:1}},
      {ic:"💴", t:"2,000 ～ 4,000 萬日圓", add:{mansion_used:2, chuko_kodate:2, invest_rent:1}},
      {ic:"💵", t:"4,000 ～ 6,000 萬日圓", add:{chuko_kodate:2, mansion_new:1, shinchiku_kodate:1}},
      {ic:"💰", t:"6,000 萬 ～ 1 億日圓", add:{shinchiku_kodate:2, mansion_new:2, chumon:1}},
      {ic:"💎", t:"1 億日圓以上", add:{chumon:2, mansion_new:2, tower:2, shinchiku_kodate:1, invest_biz:1}},
      {ic:"📊", t:"主要看投報、預算彈性", add:{invest_rent:2, invest_hotel:2, invest_biz:2}}
    ]
  },
  {
    q:"對「屋齡與屋況」你的接受度是？",
    hint:"新屋省心但貴，中古便宜但要顧屋況。可以複選。",
    multi:true,
    opts:[
      {ic:"🆕", t:"一定要全新的", add:{shinchiku_kodate:2, mansion_new:2, tower:1}},
      {ic:"✨", t:"屋齡淺、接近全新就好", add:{mansion_new:2, shinchiku_kodate:1, tower:1}},
      {ic:"🔧", t:"中古，但要已經翻修好、可直接住的", add:{chuko_kodate:2, mansion_used:2}, used:true},
      {ic:"🏗️", t:"中古，社區已完成大規模修繕、體質健康", add:{mansion_used:2, invest_rent:1}, used:true},
      {ic:"🛠️", t:"中古、屋況普通沒關係，我打算自己找人翻修", add:{chuko_kodate:2, mansion_used:1, invest_rent:1}, used:true},
      {ic:"🧮", t:"老屋沒差，看地點跟數字就好", add:{invest_rent:2, invest_hotel:1, invest_biz:2}, used:true}
    ]
  },
  {
    q:"你想要多少「自己作主」的空間？",
    hint:"指格局、建材、風格的客製化程度。",
    multi:false,
    opts:[
      {ic:"🎨", t:"我很有堅持，市售的都不夠滿意", add:{chumon:4}},
      {ic:"🖊️", t:"有想法，但市售挑一挑可以接受", add:{shinchiku_kodate:2, chuko_kodate:1}},
      {ic:"📦", t:"想要現成配好的新成屋，直接住", add:{shinchiku_kodate:2, mansion_new:2, tower:1}},
      {ic:"👌", t:"沒特別堅持，能住／能收租就好", add:{mansion_used:2, invest_rent:1}}
    ]
  },
  {
    q:"你偏好的地點是？",
    hint:"地點會影響價格、生活跟轉手。可以複選。",
    multi:true,
    opts:[
      {ic:"🗼", t:"東京都心 23 區精華地段", add:{mansion_new:2, mansion_used:2, invest_rent:2, tower:2}},
      {ic:"🌲", t:"東京近郊、多摩地區", add:{chuko_kodate:2, shinchiku_kodate:2, chumon:1}},
      {ic:"⛵", t:"神奈川、橫濱一帶", add:{shinchiku_kodate:2, mansion_used:1, chuko_kodate:1}},
      {ic:"🌾", t:"千葉、埼玉", add:{chuko_kodate:2, chumon:2, shinchiku_kodate:1}},
      {ic:"🚉", t:"車站徒步 5 分鐘內最重要", add:{mansion_new:2, mansion_used:2, invest_rent:2, tower:1}},
      {ic:"🏬", t:"觀光區、熱鬧商圈", add:{invest_hotel:3, invest_biz:2}},
      {ic:"🏡", t:"安靜的純住宅區", add:{shinchiku_kodate:2, chumon:2, chuko_kodate:1}}
    ]
  },
  {
    q:"最後，關於「耐震・隔音・建材」你的想法？",
    hint:"這題會幫你判斷偏木造還是 RC（鋼筋混凝土）。",
    multi:false,
    opts:[
      {ic:"🛡️", t:"最重視耐震、隔音，願意多花一點預算", add:{mansion_new:1, tower:1}, structure:"rc"},
      {ic:"🌲", t:"喜歡木造的溫暖質感（日本木造技術成熟）", add:{shinchiku_kodate:1}, structure:"wood"},
      {ic:"💴", t:"預算優先，木造也完全可以", add:{}, structure:"wood"},
      {ic:"🏢", t:"想要 RC／SRC 高樓的穩固感", add:{mansion_new:1, tower:2}, structure:"rc"},
      {ic:"🙋", t:"不太懂，想聽周周的專業建議", add:{}, structure:"ask"}
    ]
  }
];

var state = { i:0, answers:[], structure:null, wantTower:false, wantUsed:false, towerBlocked:false };

function start(){
  state = { i:0, answers:[], structure:null, wantTower:false, wantUsed:false, towerBlocked:false };
  QUESTIONS.forEach(function(){ state.answers.push([]); });
  document.getElementById('intro').style.display='none';
  document.getElementById('resultHost').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

function render(){
  var Q = QUESTIONS[state.i];
  var total = QUESTIONS.length;
  document.getElementById('pfill').style.width = ((state.i)/total*100)+'%';
  document.getElementById('pnum').textContent = '第 '+(state.i+1)+' / '+total+' 題';
  var sel = state.answers[state.i];
  var h = '<div class="card">';
  h += '<div class="q-no">Q'+(state.i+1)+'</div>';
  h += '<div class="q-title">'+Q.q+'</div>';
  h += '<div class="q-hint">'+Q.hint+'</div>';
  h += Q.multi ? '<span class="multi-tag">✔ 可複選</span>' : '<span class="multi-tag single">◉ 單選題</span>';
  h += '<div class="opts">';
  Q.opts.forEach(function(o,idx){
    var on = sel.indexOf(idx)>=0;
    h += '<button class="opt'+(on?' sel':'')+'" onclick="tap('+idx+')"><span class="ic">'+o.ic+'</span><span>'+o.t+'</span>'+(Q.multi?'<span class="ck">'+(on?'✓':'')+'</span>':'')+'</button>';
  });
  h += '</div>';
  h += '<div class="q-actions">';
  h += '<button class="prev" onclick="back()">'+(state.i>0?'← 上一題':'')+'</button>';
  if(Q.multi){
    var last = (state.i===total-1);
    h += '<button class="next" onclick="nextQ()"'+(sel.length?'':' disabled')+'>'+(last?'看結果 →':'下一題 →')+'</button>';
  }
  h += '</div></div>';
  document.getElementById('qhost').innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function tap(idx){
  var Q = QUESTIONS[state.i];
  var sel = state.answers[state.i];
  if(Q.multi){
    var p = sel.indexOf(idx);
    if(p>=0) sel.splice(p,1); else sel.push(idx);
    render();
  } else {
    state.answers[state.i] = [idx];
    advance();
  }
}
function nextQ(){ if(state.answers[state.i].length) advance(); }
function advance(){ if(state.i < QUESTIONS.length-1){ state.i++; render(); } else finish(); }
function back(){ if(state.i>0){ state.i--; render(); } }

function finish(){
  var score = {};
  Object.keys(RESULTS).forEach(function(k){ score[k]=0; });
  state.wantTower = false; state.wantUsed = false; state.towerBlocked = false;
  state.answers.forEach(function(sel,qi){
    sel.forEach(function(idx){
      var o = QUESTIONS[qi].opts[idx];
      if(o.tower) state.wantTower = true;
      if(o.used) state.wantUsed = true;
      if(o.structure) state.structure = o.structure;
      var add = o.add || {};
      Object.keys(add).forEach(function(k){ score[k]+=add[k]; });
    });
  });
  // 沒有任何投資意圖（純自住）就不推投資型物件——避免「自住卻叫你買店鋪/民宿」的矛盾
  // Q1：1=收租、2=自住兼出租、3=民宿、4=店鋪；Q3：5=看投報
  var invGoal = state.answers[0].some(function(i){ return [1,2,3,4].indexOf(i)>=0; }) || state.answers[2][0]===5;
  if(!invGoal){ score.invest_rent=0; score.invest_hotel=0; score.invest_biz=0; }

  // 塔樓幾乎都要 1 億日圓以上；預算未到 1 億（非最高預算級距）就改推公寓
  var budgetIdx = state.answers[2][0];
  if(budgetIdx!==4 && score.tower>0){
    score.mansion_new += score.tower;   // 把想要塔樓的傾向導到全新/大型公寓
    score.tower = 0;
    if(state.wantTower) state.towerBlocked = true;
  }
  var ranked = Object.keys(score).sort(function(a,b){ return score[b]-score[a]; });
  var top = ranked[0], topScore = score[top];
  var also = ranked.slice(1).filter(function(k){ return score[k]>0 && score[k] >= topScore*0.7; }).slice(0,2);
  // 只有「很有堅持」(Q5 第1項) 或 很多房型分數都接近(什麼都想要/難分) 才建議注文宅
  var closeCount = ranked.filter(function(k){ return score[k]>0 && score[k] >= topScore*0.85; }).length;
  var strict = (state.answers[4].indexOf(0)>=0) || (closeCount>=4);
  showResult(top, also, strict, score, ranked);
}

function structLabel(){
  if(state.structure==='rc') return {t:"建議偏 RC（鋼筋混凝土）", why:"你重視耐震與隔音，RC 造隔音好、耐震表現穩定，適合你。"};
  if(state.structure==='wood') return {t:"木造也很適合你", why:"日本木造工法成熟、造價親民、冬暖，預算優先的話很划算。"};
  return {t:"木造 / RC 由周周依情況建議", why:"這部分可以看你的預算、地點跟需求，周周再幫你分析哪種划算。"};
}

function recapHTML(){
  var rows = '';
  state.answers.forEach(function(sel,qi){
    if(!sel.length) return;
    var txt = sel.map(function(idx){ return QUESTIONS[qi].opts[idx].t; }).join('、');
    rows += '<div class="an-row"><span class="dim">'+DIMS[qi]+'</span><span class="val">'+txt+'</span></div>';
  });
  return rows;
}

function barsHTML(score, ranked){
  var topScore = score[ranked[0]] || 1;
  var list = ranked.filter(function(k){ return score[k]>0; }).slice(0,5);
  var h = '<div class="bars"><div class="bt">📊 各房型契合度</div>';
  list.forEach(function(k,i){
    var pct = Math.round(score[k]/topScore*100);
    h += '<div class="bar-row"><span class="bar-name">'+RESULTS[k].short+'</span><span class="bar-track"><span class="bar-fill'+(i===0?'':' dim')+'" style="width:'+pct+'%"></span></span><span class="bar-pct">'+pct+'%</span></div>';
  });
  h += '</div>';
  return h;
}

function whyHTML(top){
  var a = state.answers;
  var goal = a[0].map(function(i){ return QUESTIONS[0].opts[i].t; }).join('、');
  var budget = a[2].length ? QUESTIONS[2].opts[a[2][0]].t : '';
  var place = a[5].map(function(i){ return QUESTIONS[5].opts[i].t; }).join('、');
  var s = '你在「目的」選了<b>'+(goal||'—')+'</b>';
  if(budget) s += '、預算落在<b>'+budget+'</b>';
  if(place) s += '、偏好<b>'+place+'</b>';
  s += '。'+RESULTS[top].fit+' 綜合起來，最貼近你的是 <b>'+RESULTS[top].name+'</b>。';
  return s;
}

function budgetNote(top){
  if(top.indexOf('invest')===0) return '';   // 投資型不套「自住新屋」邏輯
  var bi = state.answers[2][0];
  if(bi===undefined || bi===5) return '';   // 「看投報、預算彈性」不提醒
  // 注文宅：買地＋自建，總價偏高，低預算時提醒
  if(top==='chumon'){
    if(bi>2) return '';
    return '<div class="reality"><p><b>🏗️ 關於注文宅預算：</b>注文宅是「買地＋蓋房」，土地加上建築成本，總預算通常會偏高。用你目前設定的預算來做注文宅可能會比較吃緊，建議先跟周周聊聊，看地點與預算怎麼配置比較實際。</p><p class="cta-line"><b>想知道你的預算做得起什麼樣的房子？私訊周周幫你抓！</b></p></div>';
  }
  var wantsNew = ['shinchiku_kodate','mansion_new','tower'].indexOf(top)>=0
      || state.answers[3].indexOf(0)>=0 || state.answers[3].indexOf(1)>=0
      || state.answers[4].indexOf(2)>=0;
  var msg='', retake=false;
  if(bi===0){
    msg='老實說，用這個預算在東京都內幾乎碰不到新屋——多半是屋齡較高的中古小宅，或要往比較遠的郊區、甚至東京都以外才有機會。如果你心裡想的是新一點、地點又方便的房子，建議把預算或條件再放寬一點喔。';
    retake=true;
  } else if(bi===1){
    msg='跟你說個實話，用這個預算在東京主要販售區域通常還是以中古為主，全新的選擇很少。想要又新、地點又好，多半得再往上抓一點預算，或先從中古入手。';
  } else if(bi===2 && wantsNew){
    msg='偷偷跟你說，想在這些精華地段、用這個預算買到「全新」，其實不太容易哦😅（你的標準有一點點高～）。同樣的預算換成中古、或稍微外圍一點，選擇會多很多。';
  } else return '';
  var h = '<div class="reality"><p><b>🏷️ 關於預算：</b>'+msg+'</p>';
  h += '<p class="cta-line"><b>想知道你的預算實際能買到什麼樣的房子？直接私訊周周，我幫你抓真實行情！</b></p>';
  if(retake) h += '<button class="re-btn" onclick="start()">↺ 放寬條件，再測一次</button>';
  h += '</div>';
  return h;
}

function showResult(top, also, strict, score, ranked){
  var R = RESULTS[top];
  var st = structLabel();
  var host = document.getElementById('resultHost');
  document.getElementById('quiz').style.display='none';
  document.getElementById('pfill').style.width='100%';

  var isHouse = (top==='shinchiku_kodate'||top==='chuko_kodate'||top==='chumon');
  var isMansion = (top==='mansion_new'||top==='mansion_used'||top==='tower');

  var h = '<div class="result">';
  h += '<div class="r-lead"><span class="k">✨ 你的測驗結果</span></div>';
  h += '<div class="r-card">';
  h += '<img class="cov" src="'+R.img+'" alt="'+R.name+'">';
  h += '<div class="r-body">';
  h += '<h2>你比較適合：'+R.name+'</h2>';
  h += '<div class="tags">';
  R.tags.forEach(function(t){ h+='<span class="tag">'+t+'</span>'; });
  if(isHouse) h += '<span class="tag st">'+st.t+'</span>';
  if(isMansion) h += '<span class="tag st">RC／SRC 造</span>';
  if(top==='tower' && state.wantUsed) h += '<span class="tag st">中古塔樓 CP 值更高</span>';
  h += '</div>';
  h += '<p class="desc">'+R.desc+'</p>';
  if(isHouse) h += '<p class="desc" style="margin-top:10px;color:#2563eb">🧱 '+st.why+'</p>';
  if(isMansion && state.structure==='wood') h += '<p class="desc" style="margin-top:10px;color:#2563eb">🧱 你偏好木造的溫暖感，不過公寓大樓與塔樓幾乎都是 RC／SRC 鋼筋結構、沒有木造喔；想要木造的話，會比較適合看透天。</p>';
  h += '</div></div>';

  /* ---- 塔樓需 1 億以上的說明（只對自住方向） ---- */
  if(state.towerBlocked && top.indexOf('invest')!==0){
    h += '<div class="reality"><p><b>🏙️ 關於塔樓：</b>你嚮往塔樓（高樓層公寓），不過塔樓在東京多半要 <b>1 億日圓以上</b>的預算才比較買得到。以你目前設定的預算，會建議先從<b>全新／大型公寓大樓</b>入手，一樣有管理員、機能好、又保值。</p><p class="cta-line"><b>如果真的很想要塔樓，也可以私訊周周，我幫你看看有沒有適合的中古塔樓或方案！</b></p></div>';
  }

  /* ---- 預算現實提醒 ---- */
  h += budgetNote(top);

  /* ---- 分析 ---- */
  h += '<div class="an">';
  h += '<h3>🔍 周周的分析</h3>';
  h += '<div class="sub">根據你這 7 題的選擇，幫你整理出方向</div>';
  h += barsHTML(score, ranked);
  h += '<div class="an-why">'+whyHTML(top)+'</div>';
  h += '<div class="an-recap">';
  h += recapHTML();
  h += '</div>';
  h += '</div>';

  /* ---- 周周提醒 ---- */
  h += '<div class="r-note"><p><b>💡 周周的提醒：</b>'+R.note+'</p></div>';

  if(also.length){
    h += '<div class="r-also"><div class="h">你其實也蠻適合這些方向 👇</div>';
    also.forEach(function(k){
      var A = RESULTS[k];
      h += '<div class="mini"><img src="'+A.img+'" alt="'+A.name+'"><div><b>'+A.name+'</b><p>'+A.tags.join('・')+'</p></div></div>';
    });
    h += '</div>';
  }

  if(strict && top!=='chumon' && top.indexOf('invest')!==0){
    h += '<div class="strict"><p><b>🎨 想得很細、每種都有堅持？</b>你的答案分布蠻分散、對細節也很有想法——這種情況，市售現成的房子可能都會差你一點。真的很講究的話，可以考慮<b>注文宅（買地自己設計）</b>，蓋一間完全照你想法的房子；不過要提醒你，注文宅比較花心力、預算通常也會高一些喔。要不要走這條路，周周可以幫你評估預算再決定。</p></div>';
  }

  h += '<div class="cta">';
  h += '<a class="line" href="https://lin.ee/RscRWCp" target="_blank" rel="noopener">💬 加 LINE 問周周這個方向</a>';
  h += '<button class="re" onclick="start()">↺ 重新測一次</button>';
  h += '</div>';

  h += '<p class="disc">＊本測驗僅為協助釐清方向的趣味參考，非投資或購屋建議。實際適合的房型、貸款成數、投報率與稅務等，仍需依個案評估，並由宅建士／司法書士／稅理士確認為準。</p>';
  h += '</div>';

  host.innerHTML = h;
  host.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
