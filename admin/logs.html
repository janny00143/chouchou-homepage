<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>翻譯機紀錄｜周周（後台）</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--rose:#f43f5e;--rose-d:#e11d48;--green:#10b981;--green-d:#059669;--ink:#292524;--mut:#78716c;--bg:#fafaf9;--line:#e7e5e4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px}
header{background:#1c1917;color:#fff;padding:14px 0}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px}
header .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:900}
header a{color:#6ee7b7;text-decoration:none;font-size:13px}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0}
.btn{border:none;font-family:inherit;font-weight:700;border-radius:999px;cursor:pointer;font-size:14px;padding:9px 18px}
.btn-rose{background:var(--rose);color:#fff}.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--mut)}
.stat{color:var(--mut);font-size:14px}
.stat b{color:var(--ink);font-size:16px}
.tablewrap{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:14px}
table{border-collapse:collapse;width:100%;font-size:13.5px;white-space:nowrap}
th,td{padding:9px 12px;border-bottom:1px solid var(--line);text-align:left}
th{background:#f5f5f4;font-weight:700;position:sticky;top:0}
tr:hover td{background:#fff7f8}
td.wrap-cell{white-space:normal;min-width:180px;max-width:280px}
.tag{font-size:12px;font-weight:700;padding:2px 9px;border-radius:999px;background:#fff1f2;color:var(--rose-d)}
.msg{padding:40px 16px;text-align:center;color:var(--mut)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>📊 翻譯機紀錄</h1>
    <a href="index.html">← 回物件登錄工具</a>
  </div>
</header>
<div class="wrap">
  <div class="bar">
    <button class="btn btn-rose" onclick="load()">🔄 重新整理</button>
    <button class="btn btn-green" onclick="downloadCSV()">⬇️ 下載 CSV</button>
    <button class="btn btn-ghost" onclick="resetUsage()">🔁 加值（用量歸零）</button>
    <span class="stat" id="usage"></span>
    <span class="stat" id="stat">載入中…</span>
  </div>
  <div class="tablewrap"><table id="tbl"><thead><tr>
    <th>時間</th><th>金鑰</th><th>花費</th><th>原圖</th><th>語言</th><th>模式</th><th>類型</th><th>物件名稱</th><th>地址</th><th>交通</th><th>價格</th><th>利回</th>
  </tr></thead><tbody id="rows"><tr><td colspan="12" class="msg">載入中…</td></tr></tbody></table></div>
  <p class="stat" style="margin-top:12px">※ 記錄物件重點資料＋上傳的原圖（點縮圖看大圖）。資料存在你的 Cloudflare，僅此後台頁看得到。</p>
</div>
<script>
var WORKER_URL="https://sparkling-darkness-3cb1.janny00143.workers.dev/";
var TOKEN="zzlog_7fQk29Xb4mR8vT";
var DATA=[];
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtTime(t){try{var d=new Date(t);if(isNaN(d))return esc(t);return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}catch(e){return esc(t);}}
function imgUrl(id){return WORKER_URL+"?img="+encodeURIComponent(id)+"&token="+encodeURIComponent(TOKEN);}
function usd(n){n=Number(n)||0;if(n===0)return"$0";if(n<0.01)return"$"+n.toFixed(4);return"$"+n.toFixed(2);}
function render(){
  var rows=document.getElementById("rows");
  if(!DATA.length){rows.innerHTML='<tr><td colspan="12" class="msg">目前還沒有紀錄。<br>（要先在 Cloudflare 綁好 KV 並更新 Worker；之後有人用翻譯機就會出現）</td></tr>';document.getElementById("stat").textContent="共 0 筆";return;}
  DATA.sort(function(a,b){return (b.time||"").localeCompare(a.time||"");});
  var paidCnt=0,paidCost=0;
  rows.innerHTML=DATA.map(function(r){
    var img=(r.img&&r.id)?'<a href="'+imgUrl(r.id)+'" target="_blank" rel="noopener"><img src="'+imgUrl(r.id)+'" loading="lazy" style="height:54px;border-radius:6px;border:1px solid #e7e5e4"></a>':'—';
    var isPaid=(r.paid==1||r.paid==="1"||r.paid===true);if(isPaid)paidCnt++;
    var cost=parseFloat(r.cost)||0; // 這張的實際花費(美元)；免費金鑰=0
    var realCost=isPaid?cost:0; if(isPaid)paidCost+=realCost;
    var keyTag=isPaid?'<span class="tag" style="background:#fef3c7;color:#b45309">💳 付費</span>':'<span class="tag" style="background:#dcfce7;color:#059669">免費</span>';
    var costCell=isPaid?('<b style="color:#b45309">'+usd(realCost)+'</b>'):'<span style="color:#a8a29e">$0</span>';
    return '<tr><td>'+fmtTime(r.time)+'</td><td>'+keyTag+'</td><td>'+costCell+'</td><td>'+img+'</td><td>'+esc(r.lang)+'</td><td>'+esc(r.mode)+'</td>'
      +'<td><span class="tag">'+esc(r.type||"—")+'</span></td>'
      +'<td class="wrap-cell">'+esc(r.name)+'</td><td class="wrap-cell">'+esc(r.addr)+'</td>'
      +'<td class="wrap-cell">'+esc(r.traffic)+'</td><td>'+esc(r.price)+'</td><td>'+esc(r.yield)+'</td></tr>';
  }).join("");
  document.getElementById("stat").innerHTML="共 <b>"+DATA.length+"</b> 筆　（💳 付費 <b style='color:#b45309'>"+paidCnt+"</b> 筆、免費 "+(DATA.length-paidCnt)+" 筆）　實際花費約 <b style='color:#b45309'>"+usd(paidCost)+"</b>";
}
function showUsage(total,cap){
  var u=document.getElementById("usage");
  if(total==null){u.textContent="";return;}
  var pct=cap?Math.round(total/cap*100):0;
  u.innerHTML="用量 <b>"+total+" / "+cap+"</b>"+(total>=cap?" ⚠️ <span style='color:#e11d48'>已達上限、已暫停</span>":(pct>=80?" <span style='color:#b45309'>("+pct+"%)</span>":""));
}
function resetUsage(){
  if(!confirm("確定要把「用量」歸零嗎？（等於加值一次，讓翻譯機可以繼續用到下一個 "+"上限）"))return;
  fetch(WORKER_URL+"?reset=1&token="+encodeURIComponent(TOKEN)).then(function(r){return r.json();}).then(function(){load();}).catch(function(){alert("重設失敗，Worker 可能還沒更新");});
}
function load(){
  document.getElementById("stat").textContent="載入中…";
  fetch(WORKER_URL+"?logs=1&token="+encodeURIComponent(TOKEN)).then(function(r){return r.json();}).then(function(j){
    DATA=(j&&j.logs)?j.logs:[];showUsage(j&&j.total!=null?j.total:null, j&&j.cap?j.cap:0);render();
  }).catch(function(e){
    document.getElementById("rows").innerHTML='<tr><td colspan="12" class="msg">讀取失敗：'+esc(e.message||e)+'<br>（Worker 可能還沒更新，或 KV 尚未綁定）</td></tr>';
    document.getElementById("stat").textContent="讀取失敗";
  });
}
function csvCell(s){s=String(s==null?"":s);return '"'+s.replace(/"/g,'""')+'"';}
function downloadCSV(){
  if(!DATA.length){alert("目前沒有資料");return;}
  var head=["時間","金鑰","花費(USD)","語言","模式","類型","物件名稱","地址","交通","價格","利回","原圖網址"];
  var lines=[head.map(csvCell).join(",")];
  DATA.forEach(function(r){var isPaid=(r.paid==1||r.paid==="1"||r.paid===true);var realCost=isPaid?(parseFloat(r.cost)||0):0;lines.push([fmtTime(r.time),(isPaid?"付費":"免費"),realCost.toFixed(6),r.lang,r.mode,r.type,r.name,r.addr,r.traffic,r.price,r.yield,(r.img&&r.id?imgUrl(r.id):"")].map(csvCell).join(","));});
  var blob=new Blob(["﻿"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="翻譯機紀錄.csv";a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},500);
}
load();
</script>
</body>
</html>
